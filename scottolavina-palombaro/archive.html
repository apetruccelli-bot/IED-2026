<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Archivio</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  
  <body>
    <header>
      <div class="topbar">
        <a href="./index.html" class="topbar-left font-myTitle">
          THE ABYSSAL DESCENT ARCHIVE
        </a>
        <div class="topbar-right">
          <a href="./archive.html">ARCHIVE</a>
          <a href="./map.html">MAP</a>
          <a href="./about.html">ABOUT</a>
        </div>
      </div>

      <div class="header-inner">
        <div class="header-row">
          <div class="search-wrap">
            <input
              id="search"
              type="search"
              placeholder="Search…"
              autocomplete="off"
            />
          </div>
        </div>
        <div class="tags-bar" id="tags-bar"></div>
      </div>
    </header>


    <main class="grid" id="grid"></main>

    <aside class="area-bar" id="area-bar"></aside>

    <div id="lightbox" class="lightbox archive-lightbox" aria-hidden="true">
  <div id="lbBackdrop" class="lightbox-backdrop"></div>

  <div class="lightbox-content">
    <button id="lbPrev" class="lightbox-nav lightbox-prev text-sm transform scale-60" transition-opacity duration-200 hover:opacity-50 aria-label="Previous image">←</button>
    <button id="lbClose" class="lightbox-close">close</button>
    <button id="lbNext" class="lightbox-nav lightbox-next text-sm transform scale-60" aria-label="Next image">→</button>

    <div class="lightbox-main">
      <img id="lbImg" class="lightbox-img" src="" alt="">
    </div>

    <div id="lbCaption" class="lightbox-caption" aria-live="polite"></div>

    <div class="lb-info" id="lb-info">
      <p class="lb-description" id="lb-description"></p>
      <div class="lb-meta" id="lb-meta"></div>
    </div>

    <div class="lightbox-see-also">
      <p class="lightbox-see-also-title">See also...</p>
      <div id="lbSimilar" class="lightbox-similar-grid"></div>
    </div>
  </div>
</div>

    <script src="script.js"></script>
    <script src="/dark-mode-loader.js"></script>
    
  </body>
</html>

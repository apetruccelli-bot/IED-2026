<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mappa</title>

    <link rel="stylesheet" href="style.css" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link
  href="https://api.mapbox.com/mapbox-gl-js/v3.11.0/mapbox-gl.css"
  rel="stylesheet"
/>

<script src="https://api.mapbox.com/mapbox-gl-js/v3.11.0/mapbox-gl.js"></script>
  </head>

  <body class="map-page-body">
    <header>
      <div class="topbar">
        <a href="./index.html" class="topbar-left font-myTitle">
          THE ABYSSAL DESCENT ARCHIVE
        </a>
        <div class="topbar-right">
          <a href="./archive.html">ARCHIVE</a>
          <a href="./map.html">MAP</a>
          <a href="./about.html">ABOUT</a>
        </div>
      </div>
    </header>

    <main class="map-page">
      <div id="map"></div>
      <div id="gallery" class="map-gallery" aria-live="polite"></div>
    </main>

    <script src="map.js"></script>

    <!-- Hand-tracking overlay and libs -->
    <div id="ml-overlay" style="position: fixed; top: 12px; right: 12px; z-index: 1100; pointer-events: none;">
      <div id="ml-container" style="position: relative; width:240px; height:180px;">
        <video id="webcam" autoplay muted playsinline style="width:240px; height:180px; object-fit:cover; border-radius:6px; transform:scaleX(-1); display:block;"></video>
        <canvas id="canvas" width="240" height="180" style="position:absolute; left:0; top:0; width:240px; height:180px; pointer-events:none;"></canvas>
      </div>
      <div id="status" style="color:#fff; font-size:12px; margin-top:6px;">Loading model...</div>
    </div>

    <!-- ML libs (TensorFlow + MediaPipe + hand-pose-detection) -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.11.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.11.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.11.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/hand-pose-detection@2.0.0"></script>
    <script src="machine-learning/hand-tracking/script.js"></script>
    <script src="/dark-mode-loader.js"></script>
  </body>
</html>

<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mappa</title>

    <link rel="stylesheet" href="style.css" />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        --color-myBlack: #1E1E1E;
        --color-myWhite: #FCFCFC;
        --spacing-10px: 10px;
      }
    </style>

    <link
  href="https://api.mapbox.com/mapbox-gl-js/v3.11.0/mapbox-gl.css"
  rel="stylesheet"
/>

<script src="https://api.mapbox.com/mapbox-gl-js/v3.11.0/mapbox-gl.js"></script>
  </head>

  <body>
    <header>
      <div class="topbar">
        <a href="./index.html" class="topbar-left font-myTitle">
          THE ABYSSAL DESCENT ARCHIVE
        </a>
        <div class="topbar-right">
          <a href="./archive.html">ARCHIVE</a>
          <a href="./map.html">MAP</a>
          <a href="./about.html">ABOUT</a>
        </div>
      </div>
    </header>

    <main class="map-page">
      <div id="map"></div>
      <div id="gallery" class="map-gallery" aria-live="polite"></div>
    </main>

    <style>
      .map-page { position:relative; }
      #map { width:100%; height:70vh; }
      .map-gallery { display:flex; gap:8px; padding:12px; background:rgba(0,0,0,0.7); color:#fff; overflow-x:auto; }
      .map-gallery img{ height:80px; object-fit:cover; border-radius:4px; cursor:pointer; opacity:0.95; transition:opacity .15s; }
      .map-gallery img:hover{ opacity:1; transform:scale(1.02); }
      .map-gallery .empty{ opacity:0.6 }
    </style>

    <script src="map.js"></script>
  </body>
</html>

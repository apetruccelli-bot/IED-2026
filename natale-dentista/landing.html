<!doctype html>
<html lang="it">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Landing</title>
		<link rel="stylesheet" href="style.css">
		<style>
			/* Fullscreen landing image + fade-in */
			html, body {
				height: 100%;
				margin: 0;
				background: #000;
			}

			.landing-wrap {
				position: fixed;
				inset: 0;
				display: flex;
				align-items: center;
				justify-content: center;
				overflow: hidden;
				background: #000;
			}

			.landing-wrap img {
				width: 100vw;
				height: 100vh;
				object-fit: cover;
				display: block;
				opacity: 0;
				transition: opacity 900ms ease-in-out;
			}

			.landing-wrap img.loaded {
				opacity: 1;
			}

			.landing-cta {
				position: absolute;
				left: 50%;
				top: 41%;
				transform: translate(-50%, -50%);
				z-index: 998;
				color: #fff;
				text-decoration: none;
				background: transparent;
				padding: 0 18px;
				border-radius: 0;
				font-family: serif;
				font-size: 40px;
				line-height: 1;
				text-transform: lowercase;
				letter-spacing: 0.02em;
				box-shadow: none;
				text-shadow: 0 2px 8px rgba(0,0,0,0.6);
				display: inline-block;
				text-align: center;
				white-space: normal;
			}

			/* slide-from-top animation for CTA (slightly slower) */
			.landing-cta {
				transition: transform 1000ms cubic-bezier(.2,.9,.2,1), opacity 900ms ease;
				transform: translate(-50%, -120%); /* start above final position */
				opacity: 0;
				pointer-events: none; /* not clickable until shown */
			}

			.landing-cta.show {
				transform: translate(-50%, -50%); /* final position (no Y offset) */
				opacity: 1;
				pointer-events: auto; /* allow clicks only on enabled children */
				cursor: default; /* title itself should not show pointer */
			}

			/* remove default focus rectangle */
			.landing-cta:focus {
				outline: none;
				box-shadow: none;
			}

			.landing-cta::first-letter {
				text-transform: uppercase;
			}

				/* link shown under the title without underline */
				.landing-link {
					display: inline-block;
					margin-top: 12px;
					font-size: 18px;
					color: #fff;
					text-decoration: none;
					border-bottom: none;
					text-transform: lowercase; /* keep rest lowercase */
					/* start hidden and slide up slightly; will appear after title */
					opacity: 0;
					transform: translateY(6px);
					transition: opacity 450ms ease, transform 450ms ease;
					pointer-events: none; /* enabled once visible */
				}

				/* when the cta is shown, reveal the link with a small delay */
				.landing-cta.show .landing-link {
					opacity: 0.95;
					transform: translateY(0);
					transition-delay: 900ms; /* link appears after title (slower) */
					pointer-events: auto;
				}

				.landing-link::first-letter {
					text-transform: uppercase;
				}

				/* subtle hover effect for the link */
				.landing-link:hover {
					opacity: 0.75;
				}

				.landing-cta .landing-title-lines {
					line-height: 1;
					font-size: 40px;
					pointer-events: none; /* make title non-interactive */
				}
		</style>
	</head>
	<body>
		<div class="landing-wrap">
			<img id="landing-img" src="img/landing/landing1.jpeg" alt="Landing">
			<div class="landing-cta landing-title" role="heading" aria-level="1">
				<div class="landing-title-lines">Dr. Whitaker’s<br>Aberrant Findings</div>
				<a id="landing-link" class="landing-link" href="index.html?from=landing" aria-label="Start visit">Show your teeth to<br>start the visit</a>
			</div>
		</div>

		<!-- Face tracking: open mouth or smile triggers entry to site -->
		<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.11.0"></script>
		<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.11.0"></script>
		<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.11.0"></script>
		<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619"></script>
		<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-landmarks-detection@1.0.2"></script>

		<script>
			// Fade-in the landing image when it's loaded (handles cached images too)
			(function(){
				const img = document.getElementById('landing-img');
				if (!img) return;
				const cta = document.querySelector('.landing-cta');
				function show() {
					img.classList.add('loaded');
					// slightly longer delay so title appears after the image
					// increased delay so the image is visible before the title
					setTimeout(() => { if (cta) cta.classList.add('show'); }, 1200);
				}
				if (img.complete && img.naturalWidth !== 0) {
					// already loaded from cache - allow a tick for paint
					setTimeout(show, 60);
				} else {
					img.addEventListener('load', show);
				}
			})();
		</script>

		<script>
			(function(){
				const video = document.createElement('video');
				video.autoplay = true;
				video.muted = true;
				video.playsInline = true;
				video.style.display = 'none';
				document.body.appendChild(video);

				let detector = null;
				let running = false;
				let lastRun = 0;
				const throttleMs = 120; // how often to run detection

				// confirmation counters to avoid accidental triggers
				let mouthOpenCount = 0;
				let smileCount = 0;
				const CONFIRM_FRAMES = 3;

				function getFaceWidth(keypoints) {
					const xs = keypoints.map(p => p.x);
					return Math.max(...xs) - Math.min(...xs) || 1;
				}

				function isMouthOpen(kp) {
					const top = kp[13];
					const bottom = kp[14];
					if (!top || !bottom) return false;
					const dy = Math.abs(bottom.y - top.y);
					const ys = kp.map(p => p.y);
					const faceH = Math.max(...ys) - Math.min(...ys) || 1;
					const rel = dy / faceH;
					return rel > 0.035; // tuned threshold
				}

				function isSmiling(kp) {
					const left = kp[61];
					const right = kp[291];
					if (!left || !right) return false;
					const mouthW = Math.hypot(right.x - left.x, right.y - left.y);
					const faceW = getFaceWidth(kp);
					const rel = mouthW / faceW;
					// smile when mouth width is relatively large (corners pulled sideways)
					// lowered threshold to make smile detection more sensitive
					return rel > 0.42;
				}

				async function startCamera() {
					try {
						const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
						video.srcObject = stream;
						await video.play();
						await tf.setBackend('webgl');
						await tf.ready();
						detector = await faceLandmarksDetection.createDetector(
							faceLandmarksDetection.SupportedModels.MediaPipeFaceMesh,
							{ runtime: 'mediapipe', solutionPath: 'https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh', refineLandmarks: true, maxFaces: 1 }
						);
						running = true;
						requestAnimationFrame(loop);
					} catch (e) {
						console.warn('Camera or model init failed:', e && e.message);
					}
				}

				async function loop(ts) {
					if (!running) return;
					if (ts - lastRun < throttleMs) {
						requestAnimationFrame(loop);
						return;
					}
					lastRun = ts;

					try {
						const faces = await detector.estimateFaces(video, { flipHorizontal: false });
						if (faces && faces.length > 0) {
							const f = faces[0];
							const kp = f.keypoints;
							if (isMouthOpen(kp)) {
								mouthOpenCount++;
							} else {
								mouthOpenCount = 0;
							}
							if (isSmiling(kp)) {
								smileCount++;
							} else {
								smileCount = 0;
							}

							if (mouthOpenCount >= CONFIRM_FRAMES || smileCount >= CONFIRM_FRAMES) {
								// navigate to index with param and a session flag so index won't redirect back to landing
								running = false;
								try { sessionStorage.setItem('fromLanding', '1'); } catch (e) {}
								const target = 'index.html?from=landing';
								// small delay to let user see action
								setTimeout(() => { window.location.href = target; }, 200);
								return;
							}
						} else {
							// reset counters when no face
							mouthOpenCount = 0;
							smileCount = 0;
						}
					} catch (e) {
						console.warn('detection error', e && e.message);
					}

					requestAnimationFrame(loop);
				}

				// Start when user interacts with the page OR try to start immediately
				// to prompt camera permission. If autoplay is blocked, user can click CTA which will also grant permission.
				startCamera();
			})();
		</script>
	</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face tracking</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* On this interaction page show only the camera button. Keep scripts visible. */
    /* Show only the interaction wrapper and the camera container. */
    body > :not(script):not(#cameraWrapper):not(#container) { display: none !important; }

  /* Camera wrapper sits at top portion and does not fill the whole viewport */
  #cameraWrapper { position: absolute; left: 12px; top: 12px; display: flex; align-items: center; gap: 12px; z-index: 10002; padding: 6px; }

    /* Container holds the video and canvas layers and now fills the entire viewport */
    html, body { height: 100%; margin: 0; }
    #container { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 0; background: #000; }

      /* The webcam frame now fills the viewport (no framed box) */
      .webcam-frame {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: none;
        border-radius: 0;
        box-shadow: none;
        overflow: hidden;
        background: #000;
        z-index: 0;
      }

      /* Make video and canvas fill the full-screen frame */
      .cam-layer { position: absolute; left: 0; top: 0; width: 100%; height: 100%; transform: none; object-fit: cover; }
      #webcam { z-index: 0; display: block; }
      #canvas { z-index: 1; pointer-events: none; display: block; }
    /* Force-hide any residual textual tracking UI on this minimal page */
    #faceList, #handList, #status, .face-info, .hand-info, .feature-info, #info { display: none !important; }
  </style>
<body>
  <!-- hand-pose-detection (tfjs) and MediaPipe runtime for hands -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/hand-pose-detection@0.0.7/dist/hand-pose-detection.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1645985860/hands.js"></script>
</head>

<body>
<script type="module" src="natale-lm.js"></script>

  <!-- Minimal interaction: only the camera button is visible -->
  <div id="cameraWrapper">
    <!-- Camera is auto-started; the enable button was removed -->
    <!-- Back to gallery (same look & placement as About page) -->
  <a href="index.html" class="back-to-gallery">Back to gallery</a>
  </div>

    <div id="container">
      <div class="webcam-frame" id="webcamFrame">
        <video id="webcam" class="cam-layer" autoplay muted playsinline></video>
        <canvas id="canvas" class="cam-layer"></canvas>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.11.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.11.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.11.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-landmarks-detection@1.0.2"></script>
  <!-- Hand detection (optional). If unavailable, finger interactions fall back to mouse testing. -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/handpose@0.0.7"></script>

   
</body>
</html>

    <link rel="stylesheet" href="style.css" />
    <script>
      (function(){
        try {
          // Parse parameters and session flags first so we don't incorrectly
          // redirect when the user intentionally navigated from the landing page
          // (for example via the CTA link which uses ?from=landing) or when a
          // session flag was set by the landing detection code.
          const params = new URLSearchParams(window.location.search);
          const hasFrom = params.toString() !== '' && params.has('from');

          try {
            if (sessionStorage && sessionStorage.getItem && sessionStorage.getItem('fromLanding') === '1') {
              // Honor explicit session flag set by landing and don't redirect.
              sessionStorage.removeItem('fromLanding');
              // If there's a from= param present, remove it for cleanliness.
              if (hasFrom) {
                try { params.delete('from'); } catch (e) {}
                const newSearch = params.toString();
                const newUrl = window.location.pathname + (newSearch ? '?' + newSearch : '');
                history.replaceState({}, '', newUrl);
              }
              return;
            }
          } catch (e) { /* ignore sessionStorage errors */ }

          // If there's an explicit from= param (landing link), keep the user on index
          // but remove the param from the URL to keep things tidy.
          if (hasFrom) {
            try { params.delete('from'); } catch (e) {}
            const newSearch = params.toString();
            const newUrl = window.location.pathname + (newSearch ? '?' + newSearch : '');
            history.replaceState({}, '', newUrl);
            return; // do not perform a redirect
          }

          // Honor explicit session flag set by landing and don't redirect.
          // (Handled earlier: sessionStorage.fromLanding)

          // Detect navigation type (reload) and treat reloads as an occasion to show
          // the landing again. Note: browsers don't expose a reliable distinction
          // between "hard" and normal reloads; we treat any reload as a reload.
          try {
            let navType = '';
            if (performance && typeof performance.getEntriesByType === 'function') {
              const entries = performance.getEntriesByType('navigation');
              if (entries && entries.length) navType = entries[0].type || '';
            }
            // Fallback for older browsers
            if (!navType && performance && performance.navigation) {
              navType = (performance.navigation.type === 1) ? 'reload' : 'navigate';
            }

            const path = window.location.pathname || '/';
            const isIndexPath = path === '/' || path === '' || path.endsWith('/') || path.endsWith('/index.html') || path === '/index.html' || path === 'index.html';

            if (navType === 'reload' && isIndexPath && !window.location.pathname.endsWith('landing.html')) {
              // On reload of the index page, go to landing.html again.
              window.location.replace('landing.html');
              return;
            }
          } catch (e) { /* ignore navigation API errors */ }

          // If the referrer is from the same origin (internal navigation), do not redirect.
          const ref = document.referrer;
          if (ref) {
            try {
              const refUrl = new URL(ref);
              if (refUrl.origin === location.origin) return; // internal navigation -> no redirect
            } catch (e) { /* ignore invalid referrer parsing */ }
          }

          // Now check localStorage: if this is the very first visit (no seenLanding)
          // and we're on the root/index path, send the user to the landing page once.
          try {
            if (typeof localStorage !== 'undefined') {
              const seen = localStorage.getItem('seenLanding');
              const path2 = window.location.pathname || '/';
              const isIndexPath2 = path2 === '/' || path2 === '' || path2.endsWith('/') || path2.endsWith('/index.html') || path2 === '/index.html' || path2 === 'index.html';
              if (!seen && isIndexPath2 && !window.location.pathname.endsWith('landing.html')) {
                try { localStorage.setItem('seenLanding', '1'); } catch (e) {}
                window.location.replace('landing.html');
                return;
              }
            }
          } catch (e) { /* ignore storage errors */ }

        } catch (e) {
          // If anything goes wrong, avoid breaking the page and do not redirect.
          console.warn('Redirect check failed:', e && e.message);
        }
      })();
    </script>
  </head>
  <body>

<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Archivio</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="archive-title">
      <div class="line1">Dr. Whitaker’s</div>
      <div class="line2">Aberrant Findings</div>
    </div>

    
    <main class="grid" id="grid"></main>

    <aside class="left-panel" id="left-panel">
      <div class="panel-inner">
        <div class="categories-list" id="categories-list"></div>
      </div>
    </aside>

    <!-- right-side thumbnail rail -->
    <div class="thumb-rail" id="thumb-rail" aria-hidden="false"></div>

    <div class="lightbox" id="lightbox" aria-hidden="true">
      <div class="lb-backdrop" id="lb-backdrop"></div>
      <button class="lb-close" id="lb-close">✕</button>
      <button class="lb-prev" id="lb-prev">←</button>
      <button class="lb-next" id="lb-next">→</button>
      <div class="lb-content">
        <img class="lb-img" id="lb-img" src="" alt="">
        <div class="lb-info">
          <span class="lb-id" id="lb-id"></span>
          <div class="lb-tags" id="lb-tags"></div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>

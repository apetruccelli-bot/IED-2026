<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Archivio di Carlo.</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        --color-myBlack: #1E1E1E;
        --color-myWhite: #FCFCFC;
        --color-myGrey: #888880;
        --spacing-10px: 10px;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-inner">

        <div class="header-left">
  <div class="flex flex-col gap-1">
    <a href="index.html" class="font-myTitle">
      Abigail’s Archive. Timeline of a transformation.
    </a>

    <a href="story.html" class="font-mySubtitle" id="read-our-story">
      Read our Story
    </a>
  </div>

  <a href="about.html" class="font-mySubtitle about-link">
    About
  </a>
</div>
        <div class="tags-bar w-160 max-w-160" id="tags-bar"></div>

      </div>
    </header>

    <!-- <p class="results-info" id="results-info"></p> -->

    <div class="gridParent">

      <p id="myYear"
      class="absolute font-myYear z-30 top-0 left-1/2 -translate-x-1/2 -translate-y-1/2">1965</p>

      <div class="beforeGrid"></div>
      <main class="grid" id="grid"></main>
      <div class="afterGrid"></div>

      <div class="allYears" id="allYears"></div>
    </div>

    <div class="lightbox" id="lightbox" aria-hidden="true">
      <div class="lb-backdrop" id="lb-backdrop"></div>
      <button class="lb-close" id="lb-close">✕</button>
      <button class="lb-prev" id="lb-prev">←</button>
      <button class="lb-next" id="lb-next">→</button>
      <div class="lb-content">
        <img class="lb-img" id="lb-img" src="" alt="">
        <div class="lb-info">
          <span class="lb-id" id="lb-id"></span>
          <div class="lb-tags" id="lb-tags"></div>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/lenis@1.1.14/dist/lenis.min.js"></script>
    <script src="script.js"></script>
    <script src="/dark-mode-loader.js"></script>

    <style>

    </style>
    <script>
  const images = document.querySelectorAll('.story-img');
  const titleBlock = document.querySelector('.story-title-block');

  const modal = document.getElementById('storyModal');
  const modalImage = document.getElementById('modalImage');
  const modalTitle = document.getElementById('modalTitle');
  const modalDescription = document.getElementById('modalDescription');
  const modalClose = document.getElementById('modalClose');

  document.addEventListener('mousemove', (event) => {
    if (modal.classList.contains('active')) return;

    const x = (event.clientX / window.innerWidth - 0.5) * 2;
    const y = (event.clientY / window.innerHeight - 0.5) * 2;

    images.forEach((img, index) => {
      const movement = (index + 1) * 1.2;

      img.style.transform = `
        translate(${x * movement}px, ${y * movement}px)
      `;
    });

    titleBlock.style.transform = `
      translate(${x * -6}px, ${y * -6}px)
    `;
  });

  images.forEach((img) => {
    img.addEventListener('click', () => {
      modalImage.src = img.src;
      modalImage.alt = img.alt;

      modalTitle.textContent = img.dataset.title;
      modalDescription.textContent = img.dataset.description;

      modalImage.style.width = img.dataset.modalWidth || '80%';
      modalImage.style.height = img.dataset.modalHeight || 'auto';
      modalImage.style.left = img.dataset.modalLeft || '50%';
      modalImage.style.top = img.dataset.modalTop || '50%';

      modal.classList.add('active');
    });
  });

  function closeModal() {
    modal.classList.remove('active');
  }

  modalClose.addEventListener('click', closeModal);

  modal.addEventListener('click', (event) => {
    if (event.target === modal) {
      closeModal();
    }
  });

  document.addEventListener('keydown', (event) => {
    if (event.key === 'Escape') {
      closeModal();
    }
  });
</script>

    <script>
      const images = document.querySelectorAll('.story-img');
      const titleBlock = document.querySelector('.story-title-block');

      const modal = document.getElementById('storyModal');
      const modalImage = document.getElementById('modalImage');
      const modalTitle = document.getElementById('modalTitle');
      const modalDescription = document.getElementById('modalDescription');
      const modalClose = document.getElementById('modalClose');

      // ── Smooth parallax via lerp + rAF ──
      // Uses faceTargetX/Y set by petruccelli-ml.js when face is tracked;
      // falls back to mouse when no face is detected.
      let targetX = 0, targetY = 0;
      let currentX = 0, currentY = 0;
      const LERP = 0.06;

      document.addEventListener('mousemove', (event) => {
        // Only use mouse if face tracking hasn't moved the target recently
        if (typeof faceTargetX === 'undefined') {
          targetX = (event.clientX / window.innerWidth - 0.5) * 2;
          targetY = (event.clientY / window.innerHeight - 0.5) * 2;
        }
      });

      function animateParallax() {
        // Prefer face target if available
        const tx = (typeof faceTargetX !== 'undefined') ? faceTargetX : targetX;
        const ty = (typeof faceTargetY !== 'undefined') ? faceTargetY : targetY;

        currentX += (tx - currentX) * LERP;
        currentY += (ty - currentY) * LERP;

        if (!modal.classList.contains('active')) {
          images.forEach((img) => {
            const movement = img.classList.contains('img-l') ? 24
                           : img.classList.contains('img-m') ? 16
                           : 8;

            img.style.transform = `translate(${currentX * 10 * movement}px, ${currentY * 10 * movement}px)`;
          });

          titleBlock.style.transform = `translate(calc(-50% + ${currentX * -6}px), calc(-50% + ${currentY * -6}px))`;
        }

        requestAnimationFrame(animateParallax);
      }

      animateParallax();

      images.forEach((img) => {
        img.addEventListener('click', () => {
          modalImage.src = img.src;
          modalImage.alt = img.alt;

          modalTitle.textContent = img.dataset.title;
          modalDescription.textContent = img.dataset.description;

          modalImage.style.width = img.dataset.modalWidth || '80%';
          modalImage.style.height = img.dataset.modalHeight || 'auto';
          modalImage.style.left = img.dataset.modalLeft || '50%';
          modalImage.style.top = img.dataset.modalTop || '50%';

          modal.classList.add('active');
        });
      });

      function closeModal() {
        modal.classList.remove('active');
      }

      //modalClose.addEventListener('click', closeModal);

      modal.addEventListener('click', (event) => {
        if (event.target === modal) {
          closeModal();
        }
      });

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
          closeModal();
        }
      });
    </script>

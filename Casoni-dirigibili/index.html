<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AAA — Adler’s Aircraft Archive</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        --color-myBlack: #1E1E1E;
        --color-myWhite: #FCFCFC;
        --spacing-10px: 10px;
      }
    </style>
  </head>
  <body>

    <header class="opacity-0 h-0 overflow-hidden hidden">
      <div class="header-inner">
        <div class="header-row">
          <div class="search-wrap">
            <input
              id="search"
              type="search"
              placeholder="Cerca…"
              autocomplete="off"
            />
          </div>
          <button class="btn-random" id="btn-random">Random</button>
        </div>
        <div class="tags-bar" id="tags-bar"></div>
      </div>
    </header>
    <p class="results-info opacity-0 h-0 overflow-hidden hidden" id="results-info"></p>
    <main class="grid opacity-0 h-0 overflow-hidden hidden" id="grid"></main>

    <div class="lightbox" id="lightbox" aria-hidden="true">
      <div class="lb-backdrop" id="lb-backdrop"></div>
      <button class="lb-close" id="lb-close">✕</button>
      <button class="lb-prev" id="lb-prev">←</button>
      <button class="lb-next" id="lb-next">→</button>
      <div class="lb-content">
        <img class="lb-img" id="lb-img" src="" alt="">
        <div class="lb-info">
          <span class="lb-id" id="lb-id"></span>
          <div class="lb-tags" id="lb-tags"></div>
        </div>
      </div>
    </div>

    <div class="w-screen h-screen grid two-rows-grid">
      <div class="p-10px bg-myBlack flex flex-row justify-between text-myWhite z-[1100]">
        <div class="flex flex-col">
          <a href="/" class="font-myTitle">Adler’s Aircraft Archive</a>
          <p class="">lorem ipsum dolor sit amet.</p>
        </div>
        <div class="flex flex-col">
          <div class="">Filtro 1</div>
          <div class="">Filtro 2</div>
          <div class="">Filtro 3</div>
        </div>
      </div>
      <div class="bg-myWhite h-screen overflow-y-scroll">
        <div class="sticky top-0 z-20 col-span-full p-10px bg-myWhite ">
          <div class="grid grid-cols-6">
          </div>
            <div id="archive-rows" class="-mt-1 bg-myWhite"></div>
        </div>
          <div id="archive-gallery" 
          class="grid-results grid grid-cols-6 gap-[50px] mt-20px p-10px"></div>
      </div>
    </div>

    <script src="script.js"></script>

  </body>
</html>

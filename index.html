<!DOCTYPE html>
<html>
<head>
  <title>De veciariìe - Landing</title>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="mask-icon" href="/favicon.svg" color="#5bbad5">
  <meta name="msapplication-TileColor" content="#678fa6">
  <meta name="theme-color" content="#ffffff">

  <style>
    @font-face {
      font-family: 'Prophet Medium';
      src: url('Somma-Banchi/font/ABCProphet-Medium-Trial.woff2') format('woff2');
      font-style: normal;
    }

    @font-face {
      font-family: 'Prophet Regular';
      src: url('Somma-Banchi/font/ABCProphet-Regular-Trial.woff2') format('woff2');
      font-style: italic;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      background: #f8d6de;
      font-family: 'Prophet Regular', sans-serif;
      overflow-x: hidden;
    }

    /* ── INTRO SECTION ── */
    .intro {
      height: 300vh;
      background: #f8d6de;
      position: relative;
    }

    .logo {
      position: fixed;
      top: 10px;
      left: 10px;
      margin: 0;
      z-index: 10;
      font-size: 28px;
      font-weight: 400;
      letter-spacing: 0.02em;
      font-family: 'Prophet Medium', sans-serif;
      color: #090909;
      line-height: 100%;
    }

    .archive-stack {
      position: sticky;
      top: 0;
      height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .archive-img {
      position: absolute;
      width: clamp(180px, 22vw, 360px);
      height: clamp(240px, 30vw, 460px);
      object-fit: cover;
      opacity: 0.55;
      transform-origin: center;
      will-change: transform, opacity;
      filter: grayscale(30%);
    }

    /* ── HOME PAGE ── */
    .home {
      min-height: 100vh;
      background: #FAFAFA;
      padding: 120px 24px;
    }

    .home h2 {
      font-family: 'Prophet Medium', sans-serif;
      font-size: 48px;
      color: #090909;
      margin-bottom: 40px;
    }

    .home p {
      font-size: 16px;
      line-height: 1.6;
      color: #090909;
    }
  </style>
</head>

<body>
  <section class="intro">
    <h1 class="logo">De veciariìe</h1>

    <div class="archive-stack">
      <img src="Somma-Banchi/img/col1.png" class="archive-img" style="--x:-55vw; --y:-50vh; --r:-8deg;">
      <img src="Somma-Banchi/img/col2.png" class="archive-img" style="--x:-35vw; --y:-55vh; --r:5deg;">
      <img src="Somma-Banchi/img/col3.png" class="archive-img" style="--x:40vw; --y:-52vh; --r:-4deg;">
      <img src="Somma-Banchi/img/col4.png" class="archive-img" style="--x:55vw; --y:-45vh; --r:7deg;">
      <img src="Somma-Banchi/img/col5.png" class="archive-img" style="--x:-55vw; --y:48vh; --r:6deg;">
      <img src="Somma-Banchi/img/col6.png" class="archive-img" style="--x:-30vw; --y:55vh; --r:-5deg;">
      <img src="Somma-Banchi/img/col7.png" class="archive-img" style="--x:45vw; --y:50vh; --r:4deg;">
      <img src="Somma-Banchi/img/col8.png" class="archive-img" style="--x:58vw; --y:42vh; --r:-7deg;">
    </div>
  </section>

  <main class="home">
    <h2>Archivio De veciariìe</h2>
    <p>Scopri la collezione completa di coltelli e strumenti da lavoro.</p>
    <p><a href="Somma-Banchi/index.html" style="color: #090909; text-decoration: underline; cursor: pointer;">Entra in archivio →</a></p>
  </main>

  <!-- GSAP Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

  <script>
    gsap.registerPlugin(ScrollTrigger);

    const images = gsap.utils.toArray(".archive-img");

    const tl = gsap.timeline({
      scrollTrigger: {
        trigger: ".intro",
        start: "top top",
        end: "bottom bottom",
        scrub: true,
        pin: ".archive-stack",
        markers: false
      }
    });

    // Animazione di apertura: le immagini si allargano e si posizionano
    tl.fromTo(
      images,
      {
        x: 0,
        y: 0,
        rotate: 0,
        scale: 0.9,
        opacity: 0.55
      },
      {
        x: (i, el) => {
          const xVal = el.style.getPropertyValue("--x").trim();
          return gsap.utils.unitize(parseFloat(xVal));
        },
        y: (i, el) => {
          const yVal = el.style.getPropertyValue("--y").trim();
          return gsap.utils.unitize(parseFloat(yVal));
        },
        rotate: (i, el) => {
          const rVal = el.style.getPropertyValue("--r").trim();
          return parseFloat(rVal);
        },
        scale: 1,
        opacity: 1,
        stagger: 0.03,
        duration: 1.4,
        ease: "power2.out"
      },
      0
    );

    // Animazione di dissolvenza: le immagini scompaiono
    tl.to(
      images,
      {
        opacity: 0,
        scale: 0.95,
        duration: 0.8,
        ease: "power2.inOut"
      }
    );

    // Reindirizzamento automatico al fondo
    ScrollTrigger.create({
      trigger: ".intro",
      onUpdate: (self) => {
        if (self.progress > 0.99) {
          // Quasi al fondo, abilita il link o reindirizza
          sessionStorage.setItem('fromLanding', 'true');
        }
      }
    });
  </script>
</body>
</html>

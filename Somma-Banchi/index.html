    <div class="mainLayout fixed top-0 left-0 w-screen h-screen overflow-y-scroll
    grid grid-cols-15 gap-10px">

        class="filters flex flex-col gap-12 mt-auto h-fit"></div>

        <div class="myColumn column-2"></div>

        <div class="myColumn column-4"></div>

      <button class="lb-close" id="lb-close">✕</button>
      <button class="lb-prev" id="lb-prev">←</button>
      <button class="lb-next" id="lb-next">→</button>
      <div class="lb-content">

        <div class="lb-info">

<!doctype html> 
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>De Veciariìe - Landing</title>

  <script>
    if ("scrollRestoration" in history) history.scrollRestoration = "manual";
    window.scrollTo(0, 0);

    window.addEventListener("pageshow", (e) => {
      if (e.persisted) window.scrollTo(0, 0);
    });

    window.addEventListener("beforeunload", () => {
      window.scrollTo(0, 0);
    });
  </script>

  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style type="text/tailwindcss">
    @theme {
      --color-myBlack: #090909;
      --color-myWhite: #FAFAFA;
      --color-lightGrey: #EBEBEA;
      --spacing-10px: 10px;
      --spacing-20px: 20px;
    }
  </style>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      /*
        Puoi regolare da qui l'opacità del contenitore immagini.
        Valori più bassi = immagini più leggere.
      */
      --images-container-opacity-min: 0.33;
      --images-container-opacity-max: 0.9;

      /*
        Puoi regolare da qui lo zoom delle immagini.
        Valori più bassi = immagini meno zoomate / più piccole.
      */
      --image-scale-start: 0.88;
      --image-scale-end-desktop: 1.2;
      --image-scale-end-mobile: 0.88;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: #f5d7df;
      overflow: hidden;
    }

    body {
      min-height: 100vh;
    }

    .landing-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      z-index: 100;
      padding: 10px;
      background: transparent;
      color: #090909;
      pointer-events: none;
    }

    .archive-title {
      position: fixed;
      left: 50%;
      top: 50%;
      z-index: 120;
      transform: translate(-50%, -50%);
      line-height: inherit;
      font-weight: inherit;
      letter-spacing: inherit;
      text-transform: inherit;
      color: #090909;
      white-space: nowrap;
      opacity: 1;
      will-change: transform, left, top, opacity;
    }

    .landing-stage {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #f5d7df;
      overflow: hidden;
    }

    /*
      Contenitore unico delle immagini.
      L'opacità viene applicata qui, non alle singole immagini.
    */
    .image-opacity-container {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      opacity: 0;
      will-change: opacity;
    }

    .image-card {
      position: absolute;
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      background-color: transparent;
      opacity: 1;
      will-change: transform, left, top;
    }

    /*
      Immagini desktop leggermente ridotte,
      così non risultano troppo zoomate e non si toccano troppo.
    */
    .image-card:nth-child(1) {
      width: 235px;
      height: 300px;
    }

    .image-card:nth-child(2) {
      width: 225px;
      height: 288px;
    }

    .image-card:nth-child(3) {
      width: 240px;
      height: 215px;
    }

    .image-card:nth-child(4) {
      width: 220px;
      height: 155px;
    }

    .image-card:nth-child(5) {
      width: 230px;
      height: 210px;
    }

    .image-card:nth-child(6) {
      width: 218px;
      height: 172px;
    }

    .image-card:nth-child(7) {
      width: 238px;
      height: 272px;
    }

    .enter-home {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #fafafa;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 200;
    }

    .enter-home.visible {
      opacity: 1;
    }

    @media (max-width: 900px) {
      .image-card:nth-child(1),
      .image-card:nth-child(2),
      .image-card:nth-child(3),
      .image-card:nth-child(4),
      .image-card:nth-child(5),
      .image-card:nth-child(6),
      .image-card:nth-child(7) {
        width: 145px;
      }

      .image-card:nth-child(1) {
        height: 188px;
      }

      .image-card:nth-child(2) {
        height: 182px;
      }

      .image-card:nth-child(3) {
        height: 136px;
      }

      .image-card:nth-child(4) {
        height: 104px;
      }

      .image-card:nth-child(5) {
        height: 132px;
      }

      .image-card:nth-child(6) {
        height: 116px;
      }

      .image-card:nth-child(7) {
        height: 172px;
      }
    }

    @media (max-width: 520px) {
      .image-card:nth-child(1),
      .image-card:nth-child(2),
      .image-card:nth-child(3),
      .image-card:nth-child(4),
      .image-card:nth-child(5),
      .image-card:nth-child(6),
      .image-card:nth-child(7) {
        width: 108px;
      }

      .image-card:nth-child(1) {
        height: 142px;
      }

      .image-card:nth-child(2) {
        height: 138px;
      }

      .image-card:nth-child(3) {
        height: 104px;
      }

      .image-card:nth-child(4) {
        height: 80px;
      }

      .image-card:nth-child(5) {
        height: 102px;
      }

      .image-card:nth-child(6) {
        height: 90px;
      }

      .image-card:nth-child(7) {
        height: 130px;
      }
    }
  </style>
</head>

<body class="font-myTitle">
  <header class="landing-header">
    <div class="archive-title font-myTitle">De Veciariìe</div>
  </header>

  <main class="landing-stage">
    <div class="image-opacity-container">
      <div class="image-card"></div>
      <div class="image-card"></div>
      <div class="image-card"></div>
      <div class="image-card"></div>
      <div class="image-card"></div>
      <div class="image-card"></div>
      <div class="image-card"></div>
    </div>
  </main>

  <section class="enter-home"></section>

  <script>
    const cards = document.querySelectorAll(".image-card");
    const imageOpacityContainer = document.querySelector(".image-opacity-container");
    const homePreview = document.querySelector(".enter-home");
    const archiveTitle = document.querySelector(".archive-title");

    /*
      Qui inserisci tutte le immagini che vuoi usare.
      Ogni volta che ricarichi la pagina, ne verranno scelte 7 in ordine casuale.
    */
    const imagePool = [
      "img/col19.png",
      "img/a3.png",
      "img/col9.png",
      "img/s1 (2).png",
      "img/ta5.png",
      "img/ta4.png",
      "img/col4.png",
      "img/col13.png",
      "img/col2.png",
      "img/s1 (5).png",
      "img/ta14.png",
      "img/a4.png",
      "img/b7.png",
      "img/s1 (17).png"
    ];

    function shuffleArray(array) {
      return [...array].sort(() => Math.random() - 0.5);
    }

    function assignRandomImages() {
      const shuffledImages = shuffleArray(imagePool);

      cards.forEach((card, index) => {
        const imageUrl = shuffledImages[index % shuffledImages.length];
        card.style.backgroundImage = `url("${imageUrl}")`;
      });
    }

    const ANIMATION_DURATION = 7000;
    let animationStartTime = null;
    let redirected = false;

    /*
      Layout iniziale.
      Tutte le immagini partono dal centro esatto dello schermo.
      In questo modo l'allargamento/zoom out è sempre centrato.
    */
    const startLayout = [
      { x: 51, y: 51 },
      { x: 50, y: 50 },
      { x: 52, y: 52 },
      { x: 53, y: 53 },
      { x: 54, y: 54 },
      { x: 48, y: 48 },
      { x: 49, y: 49 }
    ];

    /*
      Layout finale desktop.
      Le immagini sono più distanziate rispetto alla versione precedente.
    */
    const endLayout = [
      { x: 14, y: 35},
      { x: 38, y: 32 },
      { x: 64, y: 30 },
      { x: 88, y: 34 },
      { x: 20, y: 72 },
      { x: 50, y: 66 },
      { x: 80, y: 76 }
    ];


    /*
      Layout finale mobile.
      Anche su mobile sono più aperte tra loro.
    */
    
    const mobileEndLayout = [
      { x: 18, y: 22 },
      { x: 50, y: 28 },
      { x: 82, y: 23 },
      { x: 18, y: 58 },
      { x: 50, y: 53 },
      { x: 82, y: 60 },
      { x: 50, y: 83 }
    ];

    function lerp(start, end, progress) {
      return start + (end - start) * progress;
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function easeInOutCubic(t) {
      return t < 0.5
        ? 4 * t * t * t
        : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function getEndLayout() {
      if (window.innerWidth <= 520) {
        return mobileEndLayout;
      }

      return endLayout;
    }

    function getCssNumber(variableName, fallback) {
      const value = getComputedStyle(document.documentElement)
        .getPropertyValue(variableName)
        .trim();

      const parsedValue = parseFloat(value);

      return Number.isNaN(parsedValue) ? fallback : parsedValue;
    }

    function updateLanding(progress) {
      const scrollProgress = clamp(progress, 0, 1);

      const titleFadeCenterProgress = clamp((scrollProgress - 0.34) / 0.10, 0, 1);

      const titleAppearCornerProgress = clamp((scrollProgress - 0.48) / 0.08, 0, 1);
      const titleFadeCornerProgress = clamp((scrollProgress - 0.84) / 0.12, 0, 1);

      if (scrollProgress < 0.46) {
        archiveTitle.style.left = "50%";
        archiveTitle.style.top = "50%";
        archiveTitle.style.transform = "translate(-50%, -50%)";
        archiveTitle.style.opacity = 1 - titleFadeCenterProgress;
        archiveTitle.style.display = "block";
      } else {
        archiveTitle.style.left = "0";
        archiveTitle.style.top = "0";
        archiveTitle.style.transform = "translate(10px, 10px)";
        archiveTitle.style.opacity =
          titleAppearCornerProgress * (1 - titleFadeCornerProgress);
        archiveTitle.style.display = "block";
      }

      if (scrollProgress > 0.96) {
        archiveTitle.style.display = "none";
      }

      const imageAppearProgress = clamp((scrollProgress - 0.46) / 0.10, 0, 1);

      const spreadProgress = easeInOutCubic(
        clamp((scrollProgress - 0.52) / 0.24, 0, 1)
      );

      const fadeProgress = clamp((scrollProgress - 0.90) / 0.08, 0, 1);

      const activeEndLayout = getEndLayout();

      /*
        Opacità del gruppo intero.
        Ora puoi regolarla dalle variabili CSS in :root.
      */
      const minContainerOpacity = getCssNumber(
        "--images-container-opacity-min",
        0.55
      );

      const maxContainerOpacity = getCssNumber(
        "--images-container-opacity-max",
        0.85
      );

      const groupOpacity = lerp(
        minContainerOpacity,
        maxContainerOpacity,
        spreadProgress
      );

      imageOpacityContainer.style.opacity =
        imageAppearProgress * groupOpacity * (1 - fadeProgress);

      /*
        Scale delle immagini.
        Anche questo ora è regolabile dalle variabili CSS in :root.
      */
      const startScale = getCssNumber("--image-scale-start", 0.88);

      const endScale = window.innerWidth <= 520
        ? getCssNumber("--image-scale-end-mobile", 0.92)
        : getCssNumber("--image-scale-end-desktop", 0.96);

      cards.forEach((card, index) => {
        const start = startLayout[index];
        const end = activeEndLayout[index];

        const x = lerp(start.x, end.x, spreadProgress);
        const y = lerp(start.y, end.y, spreadProgress);

        const scale = lerp(startScale, endScale, spreadProgress);

        card.style.left = `${x}%`;
        card.style.top = `${y}%`;
        card.style.transform = `translate(-50%, -50%) scale(${scale})`;
      });

      if (scrollProgress > 0.94) {
        homePreview.classList.add("visible");
      } else {
        homePreview.classList.remove("visible");
      }
    }

    function animateLanding(timestamp) {
      if (!animationStartTime) {
        animationStartTime = timestamp;
      }

      const elapsed = timestamp - animationStartTime;
      const progress = clamp(elapsed / ANIMATION_DURATION, 0, 1);

      updateLanding(progress);

      if (progress < 1) {
        requestAnimationFrame(animateLanding);
      } else if (!redirected) {
        redirected = true;
        window.location.href = "archivio.html";
      }
    }

    window.addEventListener("resize", () => {
      if (animationStartTime) {
        const elapsed = performance.now() - animationStartTime;
        const progress = clamp(elapsed / ANIMATION_DURATION, 0, 1);
        updateLanding(progress);
      }
    });

    window.addEventListener("load", () => {
      window.scrollTo(0, 0);
      assignRandomImages();
      updateLanding(0);
      requestAnimationFrame(animateLanding);
    });
  </script>
</body>
</html>

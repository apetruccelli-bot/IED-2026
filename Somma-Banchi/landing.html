<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>De Veciariìe - Landing</title>

  <script>
    if ("scrollRestoration" in history) history.scrollRestoration = "manual";
    window.scrollTo(0, 0);

    window.addEventListener("pageshow", (e) => {
      if (e.persisted) window.scrollTo(0, 0);
    });

    window.addEventListener("beforeunload", () => {
      window.scrollTo(0, 0);
    });
  </script>

  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style type="text/tailwindcss">
    @theme {
      --color-myBlack: #090909;
      --color-myWhite: #FAFAFA;
      --color-lightGrey: #EBEBEA;
      --spacing-10px: 10px;
      --spacing-20px: 20px;
    }
  </style>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: #f5d7df;
      overflow: hidden;
    }

    body {
      min-height: 100vh;
    }

    .landing-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      z-index: 100;
      padding: 10px;
      background: transparent;
      color: #090909;
      pointer-events: none;
    }

    .archive-title {
      position: fixed;
      left: 50%;
      top: 50%;
      z-index: 120;
      transform: translate(-50%, -50%);
      line-height: inherit;
      font-weight: inherit;
      letter-spacing: inherit;
      text-transform: inherit;
      color: #090909;
      white-space: nowrap;
      opacity: 1;
      will-change: transform, left, top, opacity;
    }

    .landing-stage {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #f5d7df;
      overflow: hidden;
    }

    /*
      Contenitore unico delle immagini.
      L'opacità viene applicata qui, non alle singole immagini.
    */
    .image-opacity-container {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      opacity: 0;
      will-change: opacity;
    }

    .image-card {
      position: absolute;
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      background-color: transparent;
      opacity: 1;
      will-change: transform, left, top;
    }

    .image-card:nth-child(1) {
      width: 280px;
      height: 355px;
    }

    .image-card:nth-child(2) {
      width: 270px;
      height: 345px;
    }

    .image-card:nth-child(3) {
      width: 285px;
      height: 255px;
    }

    .image-card:nth-child(4) {
      width: 265px;
      height: 185px;
    }

    .image-card:nth-child(5) {
      width: 275px;
      height: 250px;
    }

    .image-card:nth-child(6) {
      width: 260px;
      height: 205px;
    }

    .image-card:nth-child(7) {
      width: 285px;
      height: 325px;
    }

    .enter-home {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #fafafa;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 200;
    }

    .enter-home.visible {
      opacity: 1;
    }

    @media (max-width: 900px) {
      .image-card:nth-child(1),
      .image-card:nth-child(2),
      .image-card:nth-child(3),
      .image-card:nth-child(4),
      .image-card:nth-child(5),
      .image-card:nth-child(6),
      .image-card:nth-child(7) {
        width: 175px;
      }

      .image-card:nth-child(1) {
        height: 225px;
      }

      .image-card:nth-child(2) {
        height: 220px;
      }

      .image-card:nth-child(3) {
        height: 165px;
      }

      .image-card:nth-child(4) {
        height: 125px;
      }

      .image-card:nth-child(5) {
        height: 160px;
      }

      .image-card:nth-child(6) {
        height: 140px;
      }

      .image-card:nth-child(7) {
        height: 205px;
      }
    }

    @media (max-width: 520px) {
      .image-card:nth-child(1),
      .image-card:nth-child(2),
      .image-card:nth-child(3),
      .image-card:nth-child(4),
      .image-card:nth-child(5),
      .image-card:nth-child(6),
      .image-card:nth-child(7) {
        width: 132px;
      }

      .image-card:nth-child(1) {
        height: 172px;
      }

      .image-card:nth-child(2) {
        height: 168px;
      }

      .image-card:nth-child(3) {
        height: 125px;
      }

      .image-card:nth-child(4) {
        height: 96px;
      }

      .image-card:nth-child(5) {
        height: 122px;
      }

      .image-card:nth-child(6) {
        height: 108px;
      }

      .image-card:nth-child(7) {
        height: 155px;
      }
    }
  </style>
</head>

<body class="font-myTitle">
  <header class="landing-header">
    <div class="archive-title font-myTitle">De Veciariìe</div>
  </header>

  <main class="landing-stage">
    <div class="image-opacity-container">
      <div class="image-card"></div>
      <div class="image-card"></div>
      <div class="image-card"></div>
      <div class="image-card"></div>
      <div class="image-card"></div>
      <div class="image-card"></div>
      <div class="image-card"></div>
    </div>
  </main>

  <section class="enter-home"></section>

  <script>
    const cards = document.querySelectorAll(".image-card");
    const imageOpacityContainer = document.querySelector(".image-opacity-container");
    const homePreview = document.querySelector(".enter-home");
    const archiveTitle = document.querySelector(".archive-title");

    /*
      Qui inserisci tutte le immagini che vuoi usare.
      Ogni volta che ricarichi la pagina, ne verranno scelte 7 in ordine casuale.
    */
    const imagePool = [
      "img/col19.png",
      "img/a3.png",
      "img/col9.png",
      "img/s1 (2).png",
      "img/ta5.png",
      "img/ta4.png",
      "img/col4.png",
      "img/col13.png",
      "img/col2.png",
      "img/s1 (5).png",
      "img/ta14.png",
      "img/a4.png",
      "img/b7.png",
      "img/s1 (17).png"
    ];

    function shuffleArray(array) {
      return [...array].sort(() => Math.random() - 0.5);
    }

    function assignRandomImages() {
      const shuffledImages = shuffleArray(imagePool);

      cards.forEach((card, index) => {
        const imageUrl = shuffledImages[index % shuffledImages.length];
        card.style.backgroundImage = `url("${imageUrl}")`;
      });
    }

    const ANIMATION_DURATION = 7000;
    let animationStartTime = null;
    let redirected = false;

    /*
      Layout iniziale.
      Tutte le immagini partono dal centro esatto dello schermo.
      In questo modo l'allargamento/zoom out è sempre centrato.
    */
    const startLayout = [
      { x: 50, y: 50 },
      { x: 50, y: 50 },
      { x: 50, y: 50 },
      { x: 50, y: 50 },
      { x: 50, y: 50 },
      { x: 50, y: 50 },
      { x: 50, y: 50 }
    ];

    /*
      Layout finale desktop.
      Le immagini non sono ruotate, ma sono sfasate in altezza.
    */
    const endLayout = [
      { x: 14, y: 28 },
      { x: 36, y: 39 },
      { x: 62, y: 26 },
      { x: 84, y: 41 },
      { x: 23, y: 73 },
      { x: 53, y: 66 },
      { x: 78, y: 76 }
    ];

    /*
      Layout finale mobile.
      Anche su mobile partono dal centro e si aprono senza rotazione.
    */
    const mobileEndLayout = [
      { x: 17, y: 25 },
      { x: 52, y: 31 },
      { x: 83, y: 25 },
      { x: 24, y: 58 },
      { x: 57, y: 53 },
      { x: 82, y: 62 },
      { x: 48, y: 82 }
    ];

    function lerp(start, end, progress) {
      return start + (end - start) * progress;
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function easeInOutCubic(t) {
      return t < 0.5
        ? 4 * t * t * t
        : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function getEndLayout() {
      if (window.innerWidth <= 520) {
        return mobileEndLayout;
      }

      return endLayout;
    }

    function updateLanding(progress) {
      const scrollProgress = clamp(progress, 0, 1);

      const titleFadeCenterProgress = clamp((scrollProgress - 0.34) / 0.10, 0, 1);

      const titleAppearCornerProgress = clamp((scrollProgress - 0.48) / 0.08, 0, 1);
      const titleFadeCornerProgress = clamp((scrollProgress - 0.84) / 0.12, 0, 1);

      if (scrollProgress < 0.46) {
        archiveTitle.style.left = "50%";
        archiveTitle.style.top = "50%";
        archiveTitle.style.transform = "translate(-50%, -50%)";
        archiveTitle.style.opacity = 1 - titleFadeCenterProgress;
        archiveTitle.style.display = "block";
      } else {
        archiveTitle.style.left = "0";
        archiveTitle.style.top = "0";
        archiveTitle.style.transform = "translate(10px, 10px)";
        archiveTitle.style.opacity =
          titleAppearCornerProgress * (1 - titleFadeCornerProgress);
        archiveTitle.style.display = "block";
      }

      if (scrollProgress > 0.96) {
        archiveTitle.style.display = "none";
      }

      const imageAppearProgress = clamp((scrollProgress - 0.46) / 0.10, 0, 1);

      const spreadProgress = easeInOutCubic(
        clamp((scrollProgress - 0.52) / 0.24, 0, 1)
      );

      const fadeProgress = clamp((scrollProgress - 0.90) / 0.08, 0, 1);

      const activeEndLayout = getEndLayout();

      /*
        Opacità del gruppo intero.
        Le singole immagini rimangono sempre a opacity: 1.
      */
      const groupOpacity = lerp(0.65, 1, spreadProgress);

      imageOpacityContainer.style.opacity =
        imageAppearProgress * groupOpacity * (1 - fadeProgress);

      cards.forEach((card, index) => {
        const start = startLayout[index];
        const end = activeEndLayout[index];

        const x = lerp(start.x, end.x, spreadProgress);
        const y = lerp(start.y, end.y, spreadProgress);

        /*
          Lo scale parte leggermente più piccolo e arriva più grande.
          Non c'è rotazione.
        */
        const endScale = window.innerWidth <= 520 ? 1.05 : 1.12;
        const scale = lerp(0.95, endScale, spreadProgress);

        card.style.left = `${x}%`;
        card.style.top = `${y}%`;
        card.style.transform = `translate(-50%, -50%) scale(${scale})`;
      });

      if (scrollProgress > 0.94) {
        homePreview.classList.add("visible");
      } else {
        homePreview.classList.remove("visible");
      }
    }

    function animateLanding(timestamp) {
      if (!animationStartTime) {
        animationStartTime = timestamp;
      }

      const elapsed = timestamp - animationStartTime;
      const progress = clamp(elapsed / ANIMATION_DURATION, 0, 1);

      updateLanding(progress);

      if (progress < 1) {
        requestAnimationFrame(animateLanding);
      } else if (!redirected) {
        redirected = true;
        window.location.href = "archivio.html";
      }
    }

    window.addEventListener("resize", () => {
      if (animationStartTime) {
        const elapsed = performance.now() - animationStartTime;
        const progress = clamp(elapsed / ANIMATION_DURATION, 0, 1);
        updateLanding(progress);
      }
    });

    window.addEventListener("load", () => {
      window.scrollTo(0, 0);
      assignRandomImages();
      updateLanding(0);
      requestAnimationFrame(animateLanding);
    });
  </script>
</body>
</html>

<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>De veciariìe - Landing</title>

  <script>
    // Prevent browser from restoring previous scroll position
    if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
    // Ensure page starts at top (covers reloads and bfcache/pageshow)
    window.scrollTo(0, 0);
    window.addEventListener('pageshow', (e) => { if (e.persisted) window.scrollTo(0, 0); });
    window.addEventListener('beforeunload', () => { window.scrollTo(0, 0); });
  </script>

  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style type="text/tailwindcss">
    @theme {
      --color-myBlack: #090909;
      --color-myWhite: #FAFAFA;
      --color-lightGrey: #EBEBEA;
      --spacing-10px: 10px;
      --spacing-20px: 20px;
    }
  </style>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: #f5d7df;
      font-family: inherit;
      overflow-x: hidden;
    }

    body {
      min-height: 320vh;
    }

    .landing-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      z-index: 100;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      background: transparent;
      color: #090909;
      pointer-events: none;
    }

    .landing-header span {
      font-size: 32px;
      line-height: 1;
      font-weight: 600;
      letter-spacing: -0.03em;
    }

    .landing-stage {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #f5d7df;
      overflow: hidden;
    }

    .image-card {
      position: absolute;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-color: rgba(120, 120, 120, 0.35);
      opacity: 0.75;
      will-change: transform, opacity;
    }

    .image-card:nth-child(1) {
      width: 300px;
      height: 380px;
      background-image: url("img/col1.png");
    }

    .image-card:nth-child(2) {
      width: 300px;
      height: 380px;
      background-image: url("img/col2.png");
    }

    .image-card:nth-child(3) {
      width: 300px;
      height: 270px;
      background-image: url("img/col3.png");
    }

    .image-card:nth-child(4) {
      width: 300px;
      height: 200px;
      background-image: url("img/col4.png");
    }

    .image-card:nth-child(5) {
      width: 300px;
      height: 270px;
      background-image: url("img/col5.png");
    }

    .enter-home {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 20;
    }

    .enter-home.visible {
      opacity: 1;
    }

    .enter-home h1 {
      font-size: 48px;
      font-weight: 400;
      letter-spacing: -0.03em;
      color: #090909;
    }

    @media (max-width: 900px) {
      .landing-header span {
        font-size: 28px;
      }

      .image-card:nth-child(1),
      .image-card:nth-child(2),
      .image-card:nth-child(3),
      .image-card:nth-child(4),
      .image-card:nth-child(5) {
        width: 220px;
      }

      .image-card:nth-child(1),
      .image-card:nth-child(2) {
        height: 300px;
      }

      .image-card:nth-child(3),
      .image-card:nth-child(5) {
        height: 220px;
      }

      .image-card:nth-child(4) {
        height: 160px;
      }
    }
  </style>
</head>

<body>
  <header class="landing-header">
    <!-- Intestazione rimossa per mostrare solo il titolo nell'overlay -->
  </header>

  <main class="landing-stage">
    <div class="image-card"></div>
    <div class="image-card"></div>
    <div class="image-card"></div>
    <div class="image-card"></div>
    <div class="image-card"></div>
  </main>

  <section class="enter-home">
    <h1>De Veciariìe</h1>
  </section>

  <script>
    const cards = document.querySelectorAll(".image-card");
    const homePreview = document.querySelector(".enter-home");

    const startLayout = [
      { x: 50, y: 50, r: 0 },
      { x: 48, y: 49, r: 0 },
      { x: 52, y: 50, r: 0 },
      { x: 49, y: 47, r: 0 },
      { x: 51, y: 53, r: 0 }
    ];

    const endLayout = [
      { x: 18, y: 58, r: 0 },
      { x: 40, y: 28, r: 0 },
      { x: 62, y: 52, r: 0 },
      { x: 43, y: 78, r: 0 },
      { x: 69, y: 25, r: 0 }
    ];

    function lerp(start, end, progress) {
      return start + (end - start) * progress;
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function easeInOutCubic(t) {
      return t < 0.5
        ? 4 * t * t * t
        : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function updateLanding() {
      const maxScroll = document.body.scrollHeight - window.innerHeight;
      const scrollProgress = clamp(window.scrollY / maxScroll, 0, 1);

      const spreadProgress = easeInOutCubic(clamp(scrollProgress / 0.55, 0, 1));
      const fadeProgress = clamp((scrollProgress - 0.68) / 0.22, 0, 1);

      cards.forEach((card, index) => {
        const start = startLayout[index];
        const end = endLayout[index];

        const x = lerp(start.x, end.x, spreadProgress);
        const y = lerp(start.y, end.y, spreadProgress);
        const r = lerp(start.r, end.r, spreadProgress);

        card.style.left = `${x}%`;
        card.style.top = `${y}%`;
        card.style.transform = `translate(-50%, -50%) rotate(${r}deg)`;
        card.style.opacity = 0.75 * (1 - fadeProgress);
      });

      if (scrollProgress > 0.84) {
        homePreview.classList.add("visible");
      } else {
        homePreview.classList.remove("visible");
      }

      if (scrollProgress >= 0.97) {
        window.location.href = "archivio.html";
      }
    }

    window.addEventListener("scroll", updateLanding);
    window.addEventListener("resize", updateLanding);

    window.addEventListener("load", () => {
      window.scrollTo(0, 0);
      updateLanding();
    });
  </script>
</body>
</html>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: #f5d7df;

    .landing-header {

      left: 0;
      width: 100vw;
      z-index: 100;
      padding: 10px;
      background: transparent;
      color: #090909;

    }

    .archive-title {
      position: fixed;
      left: 50%;
      top: 50%;
      z-index: 120;
      transform: translate(-50%, -50%);
      line-height: inherit;
      font-weight: inherit;
      letter-spacing: inherit;
      text-transform: inherit;
      color: #090909;
      white-space: nowrap;
      opacity: 1;
      will-change: transform, left, top, opacity;
    }

    .landing-stage {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #f5d7df;
      overflow: hidden;
    }

    .image-card {
      position: absolute;
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      background-color: transparent;
      opacity: 0;
      will-change: transform, opacity;
    }

    .image-card:nth-child(1) {
      width: 220px;
      height: 280px;
      background-image: url("img/col19.png");
    }

    .image-card:nth-child(2) {
      width: 220px;
      height: 280px;
      background-image: url("img/ta3.png");
    }

    .image-card:nth-child(3) {
      width: 220px;
      height: 200px;
      background-image: url("img/col9.png");
    }

    .image-card:nth-child(4) {
      width: 220px;
      height: 150px;
      background-image: url("img/s1 (2).png");
    }

    .image-card:nth-child(5) {
      width: 220px;
      height: 200px;
      background-image: url("img/ta5.png");
    }

    .image-card:nth-child(6) {
      width: 220px;

      background-image: url("img/ta4.png");
    }

    .image-card:nth-child(7) {

<body class="font-myTitle">
  <header class="landing-header">
    <div class="archive-title font-myTitle">De Veciariìe</div>
  </header>

  <main class="landing-stage">
    <div class="image-card"></div>
    <div class="image-card"></div>
    <div class="image-card"></div>
    <div class="image-card"></div>
    <div class="image-card"></div>
    <div class="image-card"></div>
    <div class="image-card"></div>
  </main>

  <section class="enter-home"></section>

  <script>
    const cards = document.querySelectorAll(".image-card");
    const homePreview = document.querySelector(".enter-home");
    const archiveTitle = document.querySelector(".archive-title");

    const ANIMATION_DURATION = 7000;
    let animationStartTime = null;
    let redirected = false;

    const startLayout = [
      { x: 47, y: 42, r: 0 },
      { x: 51, y: 46, r: 0 },
      { x: 54, y: 49, r: 0 },
      { x: 48, y: 52, r: 0 },
      { x: 52, y: 58, r: 0 },
      { x: 45, y: 50, r: 0 },
      { x: 55, y: 53, r: 0 }
    ];

    const endLayout = [
      { x: 15, y: 30, r: 0 },
      { x: 38, y: 32, r: 0 },
      { x: 63, y: 30, r: 0 },
      { x: 84, y: 34, r: 0 },
      { x: 24, y: 70, r: 0 },
      { x: 52, y: 70, r: 0 },
      { x: 78, y: 68, r: 0 }
    ];

    const mobileEndLayout = [
      { x: 18, y: 28, r: 0 },
      { x: 50, y: 28, r: 0 },
      { x: 82, y: 28, r: 0 },
      { x: 22, y: 56, r: 0 },
      { x: 55, y: 56, r: 0 },
      { x: 82, y: 56, r: 0 },
      { x: 50, y: 80, r: 0 }
    ];

    /*
      Opacità iniziali delle immagini quando sono sovrapposte.
      Puoi modificare questi valori per cambiare l'effetto iniziale.

      Valori più bassi = immagine più trasparente
      Valori più alti = immagine più visibile
    */
    const startOpacities = [0.5, 0.55, 0.6, 0.64, 0.7, 0.75, 0.8];

    function lerp(start, end, progress) {
      return start + (end - start) * progress;
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function easeInOutCubic(t) {
      return t < 0.5
        ? 4 * t * t * t
        : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function getEndLayout() {
      if (window.innerWidth <= 520) {
        return mobileEndLayout;
      }

      return endLayout;
    }

    function updateLanding(progress) {
      const scrollProgress = clamp(progress, 0, 1);

      /*
        Sequenza automatica:
        1. De Veciariìe appare subito al centro
        2. De Veciariìe sparisce dal centro
        3. De Veciariìe riappare direttamente in alto a sinistra
        4. appaiono le immagini sovrapposte con opacità diverse
        5. le immagini si allargano e diventano completamente visibili
        6. immagini e titolo si dissolvono
        7. sfondo chiaro e redirect ad archivio.html
      */

      const titleFadeCenterProgress = clamp((scrollProgress - 0.34) / 0.10, 0, 1);

      const titleAppearCornerProgress = clamp((scrollProgress - 0.48) / 0.08, 0, 1);
      const titleFadeCornerProgress = clamp((scrollProgress - 0.84) / 0.12, 0, 1);

      if (scrollProgress < 0.46) {
        archiveTitle.style.left = "50%";
        archiveTitle.style.top = "50%";
        archiveTitle.style.transform = "translate(-50%, -50%)";
        archiveTitle.style.opacity = 1 - titleFadeCenterProgress;
        archiveTitle.style.display = "block";
      } else {
        archiveTitle.style.left = "0";
        archiveTitle.style.top = "0";
        archiveTitle.style.transform = "translate(10px, 10px)";
        archiveTitle.style.opacity =
          titleAppearCornerProgress * (1 - titleFadeCornerProgress);
        archiveTitle.style.display = "block";
      }

      if (scrollProgress > 0.96) {
        archiveTitle.style.display = "none";
      }

      /*
        Controlli immagini:
        - imageAppearProgress: fa comparire il gruppo di immagini
        - spreadProgress: fa allargare le immagini dal centro alla posizione finale
        - fadeProgress: fa dissolvere le immagini prima del cambio pagina
        - startOpacities: opacità diverse quando le immagini sono sovrapposte
      */

      const imageAppearProgress = clamp((scrollProgress - 0.46) / 0.10, 0, 1);

      const spreadProgress = easeInOutCubic(
        clamp((scrollProgress - 0.52) / 0.24, 0, 1)
      );

      const fadeProgress = clamp((scrollProgress - 0.90) / 0.08, 0, 1);

      const activeEndLayout = getEndLayout();

      cards.forEach((card, index) => {
        const start = startLayout[index];
        const end = activeEndLayout[index];

        const x = lerp(start.x, end.x, spreadProgress);
        const y = lerp(start.y, end.y, spreadProgress);
        const r = lerp(start.r, end.r, spreadProgress);

        /*
          Qui succede la cosa importante:
          - all'inizio ogni immagine usa la sua opacità iniziale
          - mentre si allarga, arriva gradualmente a opacità 1
          - alla fine, prima del fade-out, tutte sono totalmente visibili
        */
        const startOpacity = startOpacities[index];
        const visibleOpacity = lerp(startOpacity, 1, spreadProgress);

        card.style.left = `${x}%`;
        card.style.top = `${y}%`;
        card.style.transform = `translate(-50%, -50%) rotate(${r}deg)`;
        card.style.opacity = imageAppearProgress * visibleOpacity * (1 - fadeProgress);
      });

      if (scrollProgress > 0.94) {
        homePreview.classList.add("visible");
      } else {
        homePreview.classList.remove("visible");
      }
    }

    function animateLanding(timestamp) {
      if (!animationStartTime) {
        animationStartTime = timestamp;
      }

      const elapsed = timestamp - animationStartTime;
      const progress = clamp(elapsed / ANIMATION_DURATION, 0, 1);

      updateLanding(progress);

      if (progress < 1) {
        requestAnimationFrame(animateLanding);
      } else if (!redirected) {
        redirected = true;
        window.location.href = "archivio.html";
      }
    }

    window.addEventListener("resize", () => {
      if (animationStartTime) {
        const elapsed = performance.now() - animationStartTime;
        const progress = clamp(elapsed / ANIMATION_DURATION, 0, 1);
        updateLanding(progress);
      }
    });

    window.addEventListener("load", () => {
      window.scrollTo(0, 0);
      updateLanding(0);
      requestAnimationFrame(animateLanding);
    });
  </script>
  <!-- Dark mode toggle script -->
  <script>
  (function(){
    const storageKey='site-theme';
    function apply(theme){ if(theme==='dark') document.body.classList.add('theme-dark'); else document.body.classList.remove('theme-dark'); }
    try{ const stored=localStorage.getItem(storageKey); if(stored) apply(stored); else if(window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) apply('dark'); }catch(e){}
    if(!document.getElementById('theme-toggle')){
      const btn=document.createElement('button'); btn.id='theme-toggle'; btn.className='theme-toggle'; btn.setAttribute('aria-label','Toggle theme');
      btn.innerHTML='<svg viewBox="0 0 24 24" class="sun"><path d="M6.76 4.84l-1.8-1.79L3.17 4.84l1.79 1.8 1.8-1.8zM1 13h3v-2H1v2zm10-9h2V1h-2v3zm7.03 2.05l1.79-1.8-1.79-1.79-1.8 1.79 1.8 1.79zM17 13h3v-2h-3v2zM12 19a7 7 0 100-14 7 7 0 000 14zm4.24-2.76l1.8 1.79 1.79-1.79-1.79-1.8-1.8 1.8zM4.21 19.79l1.79-1.8-1.79-1.79-1.8 1.79 1.8 1.8zM12 23h2v-3h-2v3z"/></svg><svg viewBox="0 0 24 24" class="moon"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>';
      document.body.appendChild(btn);
      btn.addEventListener('click', function(){ const isDark=document.body.classList.toggle('theme-dark'); try{localStorage.setItem(storageKey,isDark?'dark':'light');}catch(e){}; });
    }
  })();
  </script>
  <script src="/dark-mode-loader.js"></script>
</body>

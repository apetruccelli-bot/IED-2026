<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>De Veciariìe - Landing</title>

  <script>
    if ("scrollRestoration" in history) history.scrollRestoration = "manual";
    window.scrollTo(0, 0);

    window.addEventListener("pageshow", (e) => {
      if (e.persisted) window.scrollTo(0, 0);
    });

    window.addEventListener("beforeunload", () => {
      window.scrollTo(0, 0);
    });
  </script>

  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style type="text/tailwindcss">
    @theme {
      --color-myBlack: #090909;
      --color-myWhite: #FAFAFA;
      --color-lightGrey: #EBEBEA;
      --spacing-10px: 10px;
      --spacing-20px: 20px;
    }
  </style>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: #f5d7df;
      overflow: hidden;
    }

    body {
      min-height: 100vh;
    }

    .landing-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      z-index: 100;
      padding: 10px;
      background: transparent;
      color: #090909;
      pointer-events: none;
    }

    .intro-split-text {
      position: fixed;
      left: 50%;
      top: 50%;
      z-index: 130;
      transform: translate(-50%, -50%);
      width: calc(100vw - 40px);
      text-align: center;
      color: #090909;
      pointer-events: none;
      will-change: opacity, transform;
    }

    .intro-line {
      display: block;
      font: inherit;
      font-size: 24px;
      line-height: 32px;
      font-weight: inherit;
      letter-spacing: inherit;
      text-transform: inherit;
      white-space: nowrap;
      will-change: transform, opacity;
    }

    .archive-title {
      position: fixed;
      left: 50%;
      top: 50%;
      z-index: 120;
      transform: translate(-50%, -50%);
      font: inherit;
      font-size: 24px;
      line-height: inherit;
      font-weight: inherit;
      letter-spacing: inherit;
      text-transform: inherit;
      color: #090909;
      white-space: nowrap;
      opacity: 0;
      will-change: transform, left, top, opacity;
    }

    .landing-stage {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #f5d7df;
      overflow: hidden;
    }

    .image-card {
      position: absolute;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-color: rgba(120, 120, 120, 0.35);
      opacity: 0;
      will-change: transform, opacity;
    }

    .image-card:nth-child(1) {
      width: 220px;
      height: 280px;
      background-image: url("img/col19.png");
    }

    .image-card:nth-child(2) {
      width: 220px;
      height: 280px;
      background-image: url("img/a3.png");
    }

    .image-card:nth-child(3) {
      width: 220px;
      height: 200px;
      background-image: url("img/col9.png");
    }

    .image-card:nth-child(4) {
      width: 220px;
      height: 150px;
      background-image: url("img/s1 (2).png");
    }

    .image-card:nth-child(5) {
      width: 220px;
      height: 200px;
      background-image: url("img/tagli  (2).png");
    }

    .image-card:nth-child(6) {
      width: 220px;
      height: 170px;
      background-image: url("img/tagli  (4).png");
    }

    .image-card:nth-child(7) {
      width: 220px;
      height: 250px;
      background-image: url("img/col4.png");
    }

    .enter-home {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #fafafa;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 200;
    }

    .enter-home.visible {
      opacity: 1;
    }

    @media (max-width: 900px) {
      .image-card:nth-child(1),
      .image-card:nth-child(2),
      .image-card:nth-child(3),
      .image-card:nth-child(4),
      .image-card:nth-child(5),
      .image-card:nth-child(6),
      .image-card:nth-child(7) {
        width: 150px;
      }

      .image-card:nth-child(1),
      .image-card:nth-child(2) {
        height: 200px;
      }

      .image-card:nth-child(3),
      .image-card:nth-child(5) {
        height: 145px;
      }

      .image-card:nth-child(4) {
        height: 105px;
      }

      .image-card:nth-child(6) {
        height: 125px;
      }

      .image-card:nth-child(7) {
        height: 180px;
      }
    }

    @media (max-width: 520px) {
      .intro-line {
        white-space: normal;
      }

      .image-card:nth-child(1),
      .image-card:nth-child(2),
      .image-card:nth-child(3),
      .image-card:nth-child(4),
      .image-card:nth-child(5),
      .image-card:nth-child(6),
      .image-card:nth-child(7) {
        width: 118px;
      }

      .image-card:nth-child(1),
      .image-card:nth-child(2) {
        height: 155px;
      }

      .image-card:nth-child(3),
      .image-card:nth-child(5) {
        height: 110px;
      }

      .image-card:nth-child(4) {
        height: 85px;
      }

      .image-card:nth-child(6) {
        height: 98px;
      }

      .image-card:nth-child(7) {
        height: 135px;
      }
    }
  </style>
</head>

<body class="not-font-my-title">
  <header class="landing-header">
    <div class="archive-title not-font-my-title">De Veciariìe</div>
  </header>

  <div class="intro-split-text not-font-my-title">
    <span class="intro-line intro-line-top">il mestiere di ruggiero</span>
    <span class="intro-line intro-line-bottom">dall'eredità, al suo fallimento</span>
  </div>

  <main class="landing-stage">
    <div class="image-card"></div>
    <div class="image-card"></div>
    <div class="image-card"></div>
    <div class="image-card"></div>
    <div class="image-card"></div>
    <div class="image-card"></div>
    <div class="image-card"></div>
  </main>

  <section class="enter-home"></section>

  <script>
    const cards = document.querySelectorAll(".image-card");
    const homePreview = document.querySelector(".enter-home");
    const archiveTitle = document.querySelector(".archive-title");
    const introText = document.querySelector(".intro-split-text");
    const introLineTop = document.querySelector(".intro-line-top");
    const introLineBottom = document.querySelector(".intro-line-bottom");

    const ANIMATION_DURATION = 20000;
    let animationStartTime = null;
    let redirected = false;

    const startLayout = [
      { x: 50, y: 50, r: 0 },
      { x: 49, y: 49, r: 0 },
      { x: 51, y: 50, r: 0 },
      { x: 50, y: 48, r: 0 },
      { x: 50, y: 52, r: 0 },
      { x: 48, y: 51, r: 0 },
      { x: 52, y: 49, r: 0 }
    ];

    const endLayout = [
      { x: 15, y: 30, r: 0 },
      { x: 38, y: 32, r: 0 },
      { x: 63, y: 30, r: 0 },
      { x: 84, y: 34, r: 0 },
      { x: 24, y: 70, r: 0 },
      { x: 52, y: 70, r: 0 },
      { x: 78, y: 68, r: 0 }
    ];

    const mobileEndLayout = [
      { x: 18, y: 28, r: 0 },
      { x: 50, y: 28, r: 0 },
      { x: 82, y: 28, r: 0 },
      { x: 22, y: 56, r: 0 },
      { x: 55, y: 56, r: 0 },
      { x: 82, y: 56, r: 0 },
      { x: 50, y: 80, r: 0 }
    ];

    function lerp(start, end, progress) {
      return start + (end - start) * progress;
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function easeInOutCubic(t) {
      return t < 0.5
        ? 4 * t * t * t
        : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function getEndLayout() {
      if (window.innerWidth <= 520) {
        return mobileEndLayout;
      }

      return endLayout;
    }

    function updateLanding(progress) {
      const scrollProgress = clamp(progress, 0, 1);

      /*
        Sequenza automatica:
        1. frase iniziale al centro
        2. le due righe si separano lateralmente
        3. appare De Veciariìe al centro
        4. De Veciariìe sparisce dal centro
        5. De Veciariìe riappare direttamente in alto a sinistra
        6. appaiono le immagini
        7. immagini e titolo si dissolvono
        8. sfondo chiaro e redirect ad archivio.html
      */

      const introSplitProgress = easeInOutCubic(
        clamp((scrollProgress - 0.06) / 0.22, 0, 1)
      );

      const introFadeProgress = clamp((scrollProgress - 0.26) / 0.10, 0, 1);

      const introDistance = lerp(
        0,
        window.innerWidth * 0.65,
        introSplitProgress
      );

      introLineTop.style.transform = `translateX(${-introDistance}px)`;
      introLineBottom.style.transform = `translateX(${introDistance}px)`;
      introText.style.opacity = 1 - introFadeProgress;

      if (scrollProgress > 0.38) {
        introText.style.display = "none";
      } else {
        introText.style.display = "block";
      }

      const titleAppearCenterProgress = clamp((scrollProgress - 0.34) / 0.12, 0, 1);
      const titleFadeCenterProgress = clamp((scrollProgress - 0.48) / 0.08, 0, 1);

      const titleAppearCornerProgress = clamp((scrollProgress - 0.58) / 0.08, 0, 1);
      const titleFadeCornerProgress = clamp((scrollProgress - 0.76) / 0.16, 0, 1);

      if (scrollProgress < 0.56) {
        archiveTitle.style.left = "50%";
        archiveTitle.style.top = "50%";
        archiveTitle.style.transform = "translate(-50%, -50%)";
        archiveTitle.style.opacity =
          titleAppearCenterProgress * (1 - titleFadeCenterProgress);
        archiveTitle.style.display = "block";
      } else {
        archiveTitle.style.left = "0";
        archiveTitle.style.top = "0";
        archiveTitle.style.transform = "translate(10px, 10px)";
        archiveTitle.style.opacity =
          titleAppearCornerProgress * (1 - titleFadeCornerProgress);
        archiveTitle.style.display = "block";
      }

      if (scrollProgress > 0.90) {
        archiveTitle.style.display = "none";
      }

      const imageAppearProgress = clamp((scrollProgress - 0.55) / 0.16, 0, 1);

      const spreadProgress = easeInOutCubic(
        clamp((scrollProgress - 0.60) / 0.20, 0, 1)
      );

      const fadeProgress = clamp((scrollProgress - 0.74) / 0.16, 0, 1);

      const activeEndLayout = getEndLayout();

      cards.forEach((card, index) => {
        const start = startLayout[index];
        const end = activeEndLayout[index];

        const x = lerp(start.x, end.x, spreadProgress);
        const y = lerp(start.y, end.y, spreadProgress);
        const r = lerp(start.r, end.r, spreadProgress);

        card.style.left = `${x}%`;
        card.style.top = `${y}%`;
        card.style.transform = `translate(-50%, -50%) rotate(${r}deg)`;
        card.style.opacity = 0.85 * imageAppearProgress * (1 - fadeProgress);
      });

      if (scrollProgress > 0.88) {
        homePreview.classList.add("visible");
      } else {
        homePreview.classList.remove("visible");
      }
    }

    function animateLanding(timestamp) {
      if (!animationStartTime) {
        animationStartTime = timestamp;
      }

      const elapsed = timestamp - animationStartTime;
      const progress = clamp(elapsed / ANIMATION_DURATION, 0, 1);

      updateLanding(progress);

      if (progress < 1) {
        requestAnimationFrame(animateLanding);
      } else if (!redirected) {
        redirected = true;
        window.location.href = "archivio.html";
      }
    }

    window.addEventListener("resize", () => {
      if (animationStartTime) {
        const elapsed = performance.now() - animationStartTime;
        const progress = clamp(elapsed / ANIMATION_DURATION, 0, 1);
        updateLanding(progress);
      }
    });

    window.addEventListener("load", () => {
      window.scrollTo(0, 0);
      updateLanding(0);
      requestAnimationFrame(animateLanding);
    });
  </script>
</body>
</html>

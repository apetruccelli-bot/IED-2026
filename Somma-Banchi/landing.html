<!doctype html>
<html lang="it">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>De veciariìe - Landing</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        --color-myBlack: #090909;
        --color-myWhite: #FAFAFA;
        --color-lightGrey: #EBEBEA;
        --spacing-10px: 10px;
        --spacing-20px: 20px;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: #f5e6e6;
        font-family: inherit;
        overflow-x: hidden;
        overflow-y: auto;
      }

      /* Header sticky - stesso stile della homepage */
      .landing-header {
        position: fixed;
        width: 100vw;
        top: 0;
        z-index: 100;
        background: #FAFAFA;
        padding: 10px;
        display: flex;
        justify-content: space-between;
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      .landing-header.visible {
        opacity: 1;
      }

      /* Container di scroll */
      .landing-container {
        min-height: 300vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      /* Sezione hero con immagini sovrapposte */
      .hero-section {
        width: 100%;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: visible;
      }

      .images-container {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      /* Immagini sovrapposte */
      .overlay-image {
        position: fixed;
        width: 300px;
        height: 300px;
        background-size: cover;
        background-position: center;
        opacity: 0.8;
        filter: grayscale(30%);
      }

      .overlay-image:nth-child(1) {
        width: 200px;
        height: 280px;
        top: 10%;
        left: 5%;
        background-image: url('img/col1.png');
        z-index: 5;
        transform: rotate(-12deg);
      }

      .overlay-image:nth-child(2) {
        width: 180px;
        height: 260px;
        top: 25%;
        left: 18%;
        background-image: url('img/col2.png');
        z-index: 4;
        transform: rotate(8deg);
      }

      .overlay-image:nth-child(3) {
        width: 220px;
        height: 300px;
        top: 35%;
        left: 32%;
        background-image: url('img/col3.png');
        z-index: 3;
        transform: rotate(-15deg);
      }

      .overlay-image:nth-child(4) {
        width: 190px;
        height: 270px;
        top: 48%;
        left: 45%;
        background-image: url('img/col4.png');
        z-index: 2;
        transform: rotate(10deg);
      }

      .overlay-image:nth-child(5) {
        width: 210px;
        height: 290px;
        top: 20%;
        left: 56%;
        background-image: url('img/col5.png');
        z-index: 1;
        transform: rotate(-8deg);
      }

      /* Sezione di transizione */
      .transition-section {
        width: 100%;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }



      /* Ultimo contenuto - homepage */
      .homepage-preview {
        width: 100%;
        height: 100vh;
        background-color: #FAFAFA;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 30px;
      }

      .homepage-preview h1 {
        font-size: 48px;
        font-weight: 400;
        letter-spacing: -0.02em;
        color: #090909;
      }
    </style>
</head>
<body>
    <!-- Header sticky -->
    <header class="landing-header">
        <span>De veciariìe</span>
    </header>

    <!-- Container principale -->
    <div class="landing-container">
        <!-- Sezione hero con immagini -->
        <section class="hero-section">
            <div class="images-container">
                <div class="overlay-image"></div>
                <div class="overlay-image"></div>
                <div class="overlay-image"></div>
                <div class="overlay-image"></div>
                <div class="overlay-image"></div>
            </div>
        </section>

        <!-- Sezione di transizione -->
        <section class="transition-section"></section>

        <!-- Preview homepage -->
        <section class="homepage-preview">
            <h1>Archivio De veciariìe</h1>
        </section>
    </div>

    <script>
        // Resetta il flag di landing completata per testare
        localStorage.removeItem('landingCompleted');
    </script>
    <script>
        const header = document.querySelector('.landing-header');
        const images = document.querySelectorAll('.overlay-image');

        window.addEventListener('scroll', () => {
            const scrollPercentage = (window.scrollY / (document.body.scrollHeight - window.innerHeight)) * 100;
            const heroScrollPercentage = (window.scrollY / window.innerHeight) * 100;

            // Header visibility
            header.classList.toggle('visible', scrollPercentage > 5);

            // Immagini: movimento lieve durante lo scroll con sovrapposizione
            if (heroScrollPercentage < 150) {
                const progress = Math.min(heroScrollPercentage / 100, 1);
                
                images.forEach((img, index) => {
                    // Movimento minimo e lieve durante scroll
                    const yMove = progress * 100;
                    const xMove = (Math.sin(index) * progress * 50);
                    
                    // Fade out lieve
                    img.style.opacity = Math.max(0, 0.8 - progress * 0.3);
                    img.style.transform = img.style.transform.replace(/translate\([^)]*\)/, '').trim();
                    img.style.transform = `translate(${xMove}px, ${yMove}px) ${img.style.transform}`;
                });
            }

            // Reindirizza a index.html quando raggiungi il fondo della landing
            if (scrollPercentage >= 95) {
                localStorage.setItem('landingCompleted', 'true');
                window.location.href = 'index.html';
            }
        });

        // Prevent scrollbar from appearing on load
        window.addEventListener('load', () => {
            window.scrollTo(0, 0);
        });
    </script>
</body>
</html>

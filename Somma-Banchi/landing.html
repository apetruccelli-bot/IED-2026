<!doctype html> 
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>De Veciariìe - Landing</title>

  <script>
    if ("scrollRestoration" in history) history.scrollRestoration = "manual";
    window.scrollTo(0, 0);

    window.addEventListener("pageshow", (e) => {
      if (e.persisted) {
        window.location.reload();
        return;
      }

      window.scrollTo(0, 0);
    });

    window.addEventListener("beforeunload", () => {
      window.scrollTo(0, 0);
    });
  </script>

  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style type="text/tailwindcss">
    @theme {
      --color-myBlack: #090909;
      --color-myWhite: #FAFAFA;
      --color-lightGrey: #EBEBEA;
      --spacing-10px: 10px;
      --spacing-20px: 20px;
    }
  </style>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --landing-bg: #f5d7df;
      --image-hover-scale: 1.5;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: var(--landing-bg);
      overflow: hidden;
    }

    body {
      min-height: 100vh;
    }

    .landing-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      z-index: 100;
      padding: 10px;
      background: transparent;
      color: #090909;
      pointer-events: none;
    }

    .archive-title {
      position: fixed;
      z-index: 120;
      line-height: inherit;
      font-weight: inherit;
      letter-spacing: inherit;
      text-transform: inherit;
      color: #090909;
      white-space: nowrap;
      opacity: 1;
      will-change: left, top, opacity;
    }

    .landing-stage {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: var(--landing-bg);
      overflow: hidden;
    }

    .image-opacity-container {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: 80;
      pointer-events: none;
    }

    .image-card {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: var(--w);
      height: var(--h);
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      background-color: transparent;
      cursor: zoom-in;
      border: 0;
      padding: 0;
      opacity: 0;
      pointer-events: auto;
      transform: translate(-50%, -50%) scale(1);
      transform-origin: center;
      will-change: transform, opacity;
      z-index: var(--z);
    }

    .image-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: var(--image-url);
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      transform: scale(1);
      transform-origin: center;
      transition:
        transform 420ms cubic-bezier(.16, 1, .3, 1),
        filter 420ms cubic-bezier(.16, 1, .3, 1);
      will-change: transform;
    }

    .image-card:hover {
      z-index: 180;
    }

    .image-card:hover::before {
      transform: scale(var(--image-hover-scale));
      filter: contrast(1.04) saturate(1.03);
    }

    .image-card:focus-visible {
      outline: none;
    }

    .image-card:focus-visible::before {
      transform: scale(var(--image-hover-scale));
      filter: contrast(1.04) saturate(1.03);
    }

    body.landing-ready .image-card {
      animation: photoAppear 4200ms cubic-bezier(.16, 1, .3, 1) var(--delay) both;
    }

    /* Use transitions on the pseudo element for smoother Ken-Burns style zoom+pan */
    .image-card.zoom-animate::before {
      transition: transform 2000ms cubic-bezier(.16, 1, .3, 1),
                  filter 2000ms cubic-bezier(.16, 1, .3, 1),
                  background-position 2000ms cubic-bezier(.16, 1, .3, 1);
      will-change: transform, background-position, filter;
      transform: scale(1);
      background-position: center;
    }

    .image-card.is-zooming::before {
      transform: scale(var(--image-hover-scale));
      filter: contrast(1.04) saturate(1.03);
      background-position: var(--bg-pos, center);
    }

    /* When a photo is actively zooming, scale the host element smoothly
       so the transformation looks consistent with the ::before animation */
    .image-card.is-zooming {
      transform: translate(-50%, -50%) scale(var(--image-hover-scale));
      z-index: 999 !important;
      transition: transform 220ms cubic-bezier(.16, 1, .3, 1);
      will-change: transform;
    }

    /* Nearby cards get a subtle offset while another photo zooms */
    .image-card.nearby-moved {
      transition: transform 260ms cubic-bezier(.16, 1, .3, 1);
    }

    @keyframes photoAppear {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(1);
      }

      100% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
    }

    .enter-home {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      background: #fafafa;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 200;
    }

    .enter-home.visible {
      opacity: 1;
    }

    .landing-viewer {
      position: fixed;
      inset: 0;
      z-index: 190;
      display: grid;
      place-items: center;
      background: rgba(245, 215, 223, 0.92);
      opacity: 0;
      pointer-events: none;
      transition: opacity 240ms cubic-bezier(.16, 1, .3, 1);
    }

    .landing-viewer.open {
      opacity: 1;
      pointer-events: auto;
    }

    .landing-viewer-image {
      width: min(62vw, 720px);
      height: min(72vh, 680px);
      object-fit: contain;
      display: block;
    }

    .landing-viewer-btn {
      position: fixed;
      z-index: 191;
      width: 42px;
      height: 42px;
      color: #090909;
      font-family: inherit;
      font-size: 28px;
      line-height: 1;
      display: grid;
      place-items: center;
      opacity: 0.82;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .landing-viewer-btn:hover,
    .landing-viewer-btn:focus-visible {
      opacity: 1;
      transform: scale(1.08);
      outline: none;
    }

    .landing-viewer-close {
      top: 10px;
      right: 10px;
    }

    .landing-viewer-prev {
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
    }

    .landing-viewer-next {
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
    }

    .landing-viewer-prev:hover,
    .landing-viewer-prev:focus-visible,
    .landing-viewer-next:hover,
    .landing-viewer-next:focus-visible {
      transform: translateY(-50%) scale(1.08);
    }

    @media (max-width: 520px) {
      :root {
        --image-hover-scale: 1.18;
        --image-zoom-scale: 2.05;
      }

      .image-card.is-zooming::before {
        transform: scale(var(--image-zoom-scale));
        filter: contrast(1.05) saturate(1.04);
      }

      .image-card.is-zooming {
        transform: translate(-50%, -50%) scale(1.14);
      }

      html,
      body,
      .landing-stage,
      .image-opacity-container,
      .landing-viewer,
      .enter-home {
        min-height: 100dvh;
        height: 100dvh;
      }

      .landing-header {
        padding: 8px;
      }

    .archive-title {
      font-size: 18px;
    }

      .landing-viewer-image {
        width: 88vw;
        height: 64vh;
      }

      .landing-viewer-btn {
        width: 36px;
        height: 36px;
        font-size: 24px;
      }

      .landing-viewer-close {
        top: 8px;
        right: 8px;
      }

      .landing-viewer-prev {
        left: 8px;
      }

      .landing-viewer-next {
        right: 8px;
      }
    }
  </style>
</head>

<body class="font-myTitle">
  <header class="landing-header">
    <div class="archive-title font-myTitle">De Veciariìe</div>
  </header>

  <main class="landing-stage">
    <div class="image-opacity-container">
      <button class="image-card" type="button" aria-label="Apri foto 1"></button>
      <button class="image-card" type="button" aria-label="Apri foto 2"></button>
      <button class="image-card" type="button" aria-label="Apri foto 3"></button>
      <button class="image-card" type="button" aria-label="Apri foto 4"></button>
      <button class="image-card" type="button" aria-label="Apri foto 5"></button>
      <button class="image-card" type="button" aria-label="Apri foto 6"></button>
      <button class="image-card" type="button" aria-label="Apri foto 7"></button>
      <button class="image-card" type="button" aria-label="Apri foto 8"></button>
      <button class="image-card" type="button" aria-label="Apri foto 9"></button>
      <button class="image-card" type="button" aria-label="Apri foto 10"></button>
      <button class="image-card" type="button" aria-label="Apri foto 11"></button>
      <button class="image-card" type="button" aria-label="Apri foto 12"></button>
    </div>
  </main>

  <div class="landing-viewer" id="landing-viewer" aria-hidden="true">
    <img class="landing-viewer-image" id="landing-viewer-image" src="" alt="" />
    <button class="landing-viewer-btn landing-viewer-close" type="button" aria-label="Chiudi">×</button>
    <button class="landing-viewer-btn landing-viewer-prev" type="button" aria-label="Foto precedente">←</button>
    <button class="landing-viewer-btn landing-viewer-next" type="button" aria-label="Foto successiva">→</button>
  </div>

  <section class="enter-home"></section>

  <script>
    const cards = Array.from(document.querySelectorAll(".image-card"));
    const homePreview = document.querySelector(".enter-home");
    const archiveTitle = document.querySelector(".archive-title");
    const viewer = document.getElementById("landing-viewer");
    const viewerImage = document.getElementById("landing-viewer-image");
    const viewerClose = document.querySelector(".landing-viewer-close");
    const viewerPrev = document.querySelector(".landing-viewer-prev");
    const viewerNext = document.querySelector(".landing-viewer-next");

    const orderedImages = [
      "img/col19.png",
      "img/a3.png",
      "img/col9.png",
      "img/s1 (2).png",
      "img/ta5.png",
      "img/ta4.png",
      "img/col13.png",
      "img/col2.png",
      "img/s1 (5).png",
      "img/ta14.png",
      "img/a4.png",
      "img/b7.png"
    ];

    const desktopPhotoLayout = [
      { x: 12, y: 34, w: "clamp(104px, 8.8vw, 168px)", h: "clamp(144px, 12.2vw, 232px)", z: 2 },
      { x: 33, y: 31, w: "clamp(108px, 8.9vw, 170px)", h: "clamp(122px, 10vw, 192px)", z: 4 },
      { x: 55, y: 33, w: "clamp(150px, 11.5vw, 220px)", h: "clamp(94px, 7.1vw, 136px)", z: 3 },
      { x: 80, y: 31, w: "clamp(145px, 11.3vw, 218px)", h: "clamp(110px, 8.5vw, 164px)", z: 2 },
      { x: 21, y: 58, w: "clamp(145px, 11.5vw, 220px)", h: "clamp(112px, 8.9vw, 170px)", z: 1 },
      { x: 45, y: 58, w: "clamp(140px, 11.2vw, 215px)", h: "clamp(109px, 8.7vw, 168px)", z: 3 },
      { x: 70, y: 58, w: "clamp(150px, 11.8vw, 225px)", h: "clamp(112px, 8.8vw, 168px)", z: 2 },
      { x: 90, y: 58, w: "clamp(135px, 10.7vw, 205px)", h: "clamp(101px, 8vw, 154px)", z: 4 },
      { x: 13, y: 82, w: "clamp(126px, 10.5vw, 205px)", h: "clamp(116px, 9.7vw, 188px)", z: 2 },
      { x: 36, y: 82, w: "clamp(96px, 8.4vw, 160px)", h: "clamp(115px, 10vw, 190px)", z: 1 },
      { x: 61, y: 82, w: "clamp(118px, 10vw, 190px)", h: "clamp(118px, 10vw, 190px)", z: 3 },
      { x: 84, y: 82, w: "clamp(130px, 10.4vw, 200px)", h: "clamp(98px, 7.8vw, 150px)", z: 2 }
    ];

    const tabletPhotoLayout = [
      { x: 14, y: 31, w: "96px", h: "136px", z: 2 },
      { x: 38, y: 31, w: "98px", h: "112px", z: 4 },
      { x: 62, y: 31, w: "126px", h: "78px", z: 3 },
      { x: 86, y: 31, w: "124px", h: "96px", z: 2 },
      { x: 16, y: 58, w: "126px", h: "98px", z: 1 },
      { x: 40, y: 58, w: "124px", h: "96px", z: 3 },
      { x: 64, y: 58, w: "132px", h: "98px", z: 2 },
      { x: 88, y: 58, w: "118px", h: "88px", z: 4 },
      { x: 16, y: 80, w: "112px", h: "104px", z: 2 },
      { x: 39, y: 80, w: "90px", h: "108px", z: 1 },
      { x: 63, y: 80, w: "108px", h: "108px", z: 3 },
      { x: 86, y: 80, w: "116px", h: "88px", z: 1 }
    ];

    const mobilePhotoLayout = [
      { x: 19, y: 23, w: "56px", h: "78px", z: 2 },
      { x: 50, y: 23, w: "62px", h: "70px", z: 4 },
      { x: 81, y: 23, w: "74px", h: "46px", z: 3 },
      { x: 19, y: 43, w: "74px", h: "56px", z: 2 },
      { x: 50, y: 43, w: "74px", h: "58px", z: 1 },
      { x: 81, y: 43, w: "72px", h: "56px", z: 3 },
      { x: 19, y: 63, w: "74px", h: "56px", z: 2 },
      { x: 50, y: 63, w: "70px", h: "52px", z: 4 },
      { x: 81, y: 63, w: "70px", h: "64px", z: 1 },
      { x: 19, y: 83, w: "56px", h: "66px", z: 2 },
      { x: 50, y: 83, w: "64px", h: "64px", z: 3 },
      { x: 81, y: 83, w: "72px", h: "54px", z: 1 }
    ];

    const ANIMATION_DURATION = 13000;
    let animationStartTime = null;
    let redirected = false;
    let hoveringCard = false;
    let waitingForHoverEnd = false;
    let viewerOpen = false;
    let userIsNavigating = false;
    let activeImageIndex = 0;

    function selectRandomPhotosForZoom() {
      const indices = [];
      while (indices.length < 7) {
        const random = Math.floor(Math.random() * cards.length);
        if (!indices.includes(random)) {
          indices.push(random);
        }
      }
      return indices;
    }

    function getPhotoLayout() {
      if (window.innerWidth <= 520) {
        return mobilePhotoLayout;
      }

      if (window.innerWidth <= 900) {
        return tabletPhotoLayout;
      }

      return desktopPhotoLayout;
    }

    function assignOrderedImages() {
      cards.forEach((card, index) => {
        card.style.setProperty("--image-url", `url("${orderedImages[index]}")`);
      });
    }

    function applyPhotoLayout() {
      const layout = getPhotoLayout();
      cards.forEach((card, index) => {
        const item = layout[index];

        card.style.setProperty("--x", `${item.x}%`);
        card.style.setProperty("--y", `${item.y}%`);
        card.style.setProperty("--w", item.w);
        card.style.setProperty("--h", item.h);
        const imageDelay = (ANIMATION_DURATION * 0.52) / 1000;
        card.style.setProperty("--delay", `${imageDelay}s`);
        card.style.setProperty("--z", item.z);
        // expose numeric positions for JS proximity calculations
        card.dataset.cx = item.x;
        card.dataset.cy = item.y;
      });
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function updateTitle(progress) {
      const scrollProgress = clamp(progress, 0, 1);

      const titleFadeCenterProgress = clamp((scrollProgress - 0.34) / 0.025, 0, 1);

      const titleAppearCornerProgress = clamp((scrollProgress - 0.42) / 0.035, 0, 1);

      if (scrollProgress < 0.46) {
        archiveTitle.style.left = "50%";
        archiveTitle.style.top = "50%";
        archiveTitle.style.transform = "translate(-50%, -50%)";
        archiveTitle.style.opacity = 1 - titleFadeCenterProgress;
      } else {
        archiveTitle.style.left = "10px";
        archiveTitle.style.top = "10px";
        archiveTitle.style.transform = "none";
        archiveTitle.style.opacity = 1;
      }
    }

    function enterArchive() {
      if (redirected) return;
      redirected = true;
      homePreview.classList.add("visible");
      window.setTimeout(() => {
        window.location.href = "archivio.html";
      }, 320);
    }

    function requestArchiveEntry() {
      if (hoveringCard || viewerOpen || userIsNavigating) {
        waitingForHoverEnd = true;
        return;
      }

      enterArchive();
    }

    function showViewerImage(index) {
      activeImageIndex = (index + orderedImages.length) % orderedImages.length;
      viewerImage.src = orderedImages[activeImageIndex];
      viewerImage.alt = `Foto ${activeImageIndex + 1}`;
    }

    function openViewer(index) {
      userIsNavigating = true;
      viewerOpen = true;
      showViewerImage(index);
      viewer.classList.add("open");
      viewer.setAttribute("aria-hidden", "false");
      viewerClose.focus();
    }

    function closeViewer() {
      viewerOpen = false;
      viewer.classList.remove("open");
      viewer.setAttribute("aria-hidden", "true");
      cards[activeImageIndex].focus();
    }

    function showPreviousImage() {
      showViewerImage(activeImageIndex - 1);
    }

    function showNextImage() {
      showViewerImage(activeImageIndex + 1);
    }

    function animateLanding(timestamp) {
      if (!animationStartTime) {
        animationStartTime = timestamp;
      }

      const elapsed = timestamp - animationStartTime;
      const progress = clamp(elapsed / ANIMATION_DURATION, 0, 1);

      updateTitle(progress);

      if (progress < 1) {
        requestAnimationFrame(animateLanding);
      } else {
        requestArchiveEntry();
      }
    }

    window.addEventListener("resize", () => {
      applyPhotoLayout();

      if (animationStartTime) {
        const elapsed = performance.now() - animationStartTime;
        const progress = clamp(elapsed / ANIMATION_DURATION, 0, 1);
        updateTitle(progress);
      }
    });

    window.addEventListener("load", () => {
      window.scrollTo(0, 0);
      assignOrderedImages();
      applyPhotoLayout();
      updateTitle(0);

      // Seleziona 5 foto casuali per l'animazione di zoom
      const zoomIndices = selectRandomPhotosForZoom();
      cards.forEach((card, index) => {
        if (zoomIndices.includes(index)) {
          card.classList.add("zoom-animate");
        }
      });

      // schedule auto-zoom sequence (JS-driven for smoother control)
      const zoomDuration = 2000; // ms per zoom
      const zoomGap = 1200; // ms between zoom starts
      const startOffset = 5600; // ms after load to start first zoom

      function triggerZoom(card) {
        // randomize a subtle background pan direction
        const bgX = 50 + (Math.random() * 12 - 6);
        const bgY = 50 + (Math.random() * 12 - 6);
        card.style.setProperty('--bg-pos', `${bgX}% ${bgY}%`);
        card.classList.add('is-zooming');
        card.style.zIndex = 999;

        // move nearby cards
        const tx = parseFloat(card.dataset.cx || 0);
        const ty = parseFloat(card.dataset.cy || 0);
        cards.forEach(other => {
          if (other === card) return;
          const ox = parseFloat(other.dataset.cx || 0);
          const oy = parseFloat(other.dataset.cy || 0);
          const dx = ox - tx;
          const dy = oy - ty;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 40) {
            const px = (dx / 100) * window.innerWidth * 0.06; // larger shift
            const py = (dy / 100) * window.innerHeight * 0.06;
            other.classList.add('nearby-moved');
            other.style.transform = `translate(calc(-50% + ${px}px), calc(-50% + ${py}px)) scale(0.96)`;
          }
        });

        setTimeout(() => {
          // end zoom
          card.classList.remove('is-zooming');
          card.style.zIndex = '';
          cards.forEach(other => {
            if (other === card) return;
            other.classList.remove('nearby-moved');
            other.style.transform = 'translate(-50%, -50%) scale(1)';
          });
        }, zoomDuration);
      }

      zoomIndices.forEach((idx, i) => {
        setTimeout(() => triggerZoom(cards[idx]), startOffset + i * zoomGap);
      });

      cards.forEach((card, index) => {
        card.addEventListener("mouseenter", () => {
          hoveringCard = true;
        });

        card.addEventListener("mouseleave", () => {
          hoveringCard = false;
          if (waitingForHoverEnd) {
            waitingForHoverEnd = false;
            window.setTimeout(enterArchive, 700);
          }
        });

        card.addEventListener("click", () => {
          openViewer(index);
        });
      });

      

      viewerClose.addEventListener("click", closeViewer);
      viewerPrev.addEventListener("click", showPreviousImage);
      viewerNext.addEventListener("click", showNextImage);

      viewer.addEventListener("click", (event) => {
        if (event.target === viewer) {
          closeViewer();
        }
      });

      window.addEventListener("keydown", (event) => {
        if (!viewerOpen) return;

        if (event.key === "Escape") {
          closeViewer();
        } else if (event.key === "ArrowLeft") {
          showPreviousImage();
        } else if (event.key === "ArrowRight") {
          showNextImage();
        }
      });

      requestAnimationFrame(() => {
        document.body.classList.add("landing-ready");
      });

      requestAnimationFrame(animateLanding);
    });
  </script>
</body>
</html>

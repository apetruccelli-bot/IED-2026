<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Archivio</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        --color-myBlack: #1E1E1E;
        --color-myWhite: #FCFCFC;
        --spacing-10px: 10px;
        --spacing-30px: 30px;
        --spacing-40px: 40px;
      }
    </style>
    </head>
  <body class="archive-page">

    <div class="w-screen min-h-screen grid grid-cols-8 specialGrid bg-myWhite">
      <!-- Brand moved to bottom across pages -->
        <div class="col-start-2 col-end-8 bg-transparent">
          <div class="sticky archive-sticky top-0 z-20 col-span-full pt-10px pl-10px pr-10px pb-10px">
            <button
              type="button"
              class="archive-mobile-toggle p text-left bg-transparent border-0 p-0 cursor-pointer select-none"
              data-mobile-filters-toggle
              aria-controls="archive-filters-panel"
              aria-expanded="false"
            >
              Filtri
            </button>
            <div id="archive-filters-panel" class="archive-filters-panel">
              <div class="archive-filter-controls grid grid-cols-6 bg-transparent mb-10px gap-10px">
                <button type="button" class="p text-justify bg-transparent border-0 p-0 cursor-pointer select-none" data-archive-toggle aria-controls="archive-rows" aria-expanded="false">Anno</button>
                <button type="button" class="p text-justify bg-transparent border-0 p-0 cursor-pointer select-none" data-archive-toggle aria-controls="archive-rows" aria-expanded="false">Autore</button>
                <button type="button" class="p text-justify bg-transparent border-0 p-0 cursor-pointer select-none" data-archive-toggle aria-controls="archive-rows" aria-expanded="false">Regione</button>
                <button type="button" class="p text-justify bg-transparent border-0 p-0 cursor-pointer select-none" data-archive-toggle aria-controls="archive-rows" aria-expanded="false">Abitanti</button>
                <button type="button" class="p text-justify bg-transparent border-0 p-0 cursor-pointer select-none" data-archive-toggle aria-controls="archive-rows" aria-expanded="false">Documento</button>
              </div>
              <div id="archive-rows" hidden class="archive-rows-panel grid grid-cols-6 gap-10px mt-20px"></div>
            </div>
            <form action="/" class="archive-search-shell" onsubmit="return false;">
              <label for="search" class="sr-only">Ricerca</label>
              <input
                id="search"
                type="search"
                placeholder="Ricerca"
                class="w-full border-b border-myBlack bg-transparent text-myBlack outline-none placeholder:text-myBlack"
              />
            </form>
          </div>
          <div id="archive-gallery" 
          class="columns-2 xl:columns-2 p-10px"></div>
        </div>
        <div class="col-start-8 col-end-9 bg-myWhite p-10px flex flex-col justify-start items-end">
        </div>
        </div>
        
    <!-- Lightbox modal -->
    <div id="lightbox" class="lightbox" aria-hidden="true">
      <div class="lb-backdrop" id="lb-backdrop"></div>
      <div class="lb-title">
        <a href="home.html" class="font-myTitle">Città<br>interrotte</a>
        <p>di Fondazione Scorza</p>
      </div>
      <button class="lb-close" id="lb-close" type="button">✕</button>
      <button class="lb-prev" id="lb-prev" type="button">←</button>
      <button class="lb-next" id="lb-next" type="button">→</button>
      <div class="lb-content">
        <img class="lb-img" id="lb-img" src="" alt="">
        <div class="lb-info">
          <span class="lb-id" id="lb-id"></span>
          <div class="lb-desc" id="lb-desc"></div>
          </div>
      </div>
    </div>

    <script src="script.js"></script>
    
    <!-- Bottom brand + links (identical on every page) -->
    <div class="site-bottom-brand" style="position:fixed;left:10px;bottom:10px;z-index:4000;pointer-events:auto;display:flex;flex-direction:column;gap:8px">
      <div style="line-height:1">
        <a href="home.html" class="font-myTitle" style="display:inline-block">Città<br>interrotte</a>
        <p style="margin:0">di Fondazione Scorza</p>
      </div>
    </div>
    <div class="sidebar-links" style="position:fixed;right:10px;bottom:10px;z-index:4000;pointer-events:auto;display:flex;flex-direction:column;align-items:flex-end;gap:0">
      <div style="display:flex;flex-direction:column">
        <a href="storia.html" class="font-myTitle text-right">Storia</a>
        <a href="index.html" class="font-myTitle text-right">Archivio</a>
        <a href="stat.html" class="font-myTitle text-right">Dati</a>
      </div>
    </div>
  </body>
</html>

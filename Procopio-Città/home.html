<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Archivio</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
    <style type="text/tailwindcss">
      @theme {
        --color-myBlack: #1E1E1E;
        --color-myWhite: #FCFCFC;
        --spacing-10px: 10px;
        --spacing-30px: 30px;
      }
    </style>
    </head>
    <body class="home-page">
      <!-- LANDING PAGE -->
      <div id="loading-overlay" class="loading-overlay">
        <div class="loading-container">
          <img id="loading-image" class="loading-image-center" src="" alt="" />
          <div id="loading-coordinates" class="loading-coordinates"></div>
          <div id="loading-gallery" class="loading-gallery"></div>
          </div>
          </div>
          
          <!-- Bottom brand + links (identical on every page) -->
          <div class="site-bottom-brand" style="position:fixed;left:10px;top:10px;z-index:4000;pointer-events:auto;display:flex;flex-direction:column;gap:8px">
            <div style="line-height:1">
              <a href="home.html" class="font-myTitle" style="display:inline-block">Città<br>interrotte</a>
              <p style="margin:0">di Fondazione Scorza</p>
            </div>
          </div>
          <div class="sidebar-links" style="position:fixed;right:10px;top:10px;z-index:4000;pointer-events:auto;display:flex;flex-direction:column;align-items:flex-end;gap:0">
            <div style="display:flex;flex-direction:column">
              <a href="storia.html" class="font-myTitle text-right">Storia</a>
              <a href="index.html" class="font-myTitle text-right">Archivio</a>
              <a href="stat.html" class="font-myTitle text-right">Dati</a>
            </div>
          </div>
    <div id="home-map" class="home-map" aria-hidden="false"></div>

    <div id="face-far-overlay" class="face-far-overlay" aria-hidden="true">
      <p class="face-far-message font-myTitle">non abbandonare quest‘archivio</p>
    </div>
   

    <!-- Lightbox modal -->
    <div id="lightbox" class="lightbox" aria-hidden="true">
      <div class="lb-backdrop" id="lb-backdrop"></div>
      <div class="lb-title">
        <a href="home.html" class="font-myTitle">Città<br>interrotte</a>
        <p class="">di Fondazione Scorza</p>
      </div>
      <button class="lb-close" id="lb-close" type="button">✕</button>
      <button class="lb-prev" id="lb-prev" type="button">←</button>
      <button class="lb-next" id="lb-next" type="button">→</button>
      <div class="lb-content">
        <img class="lb-img" id="lb-img" src="" alt="">
        <div class="lb-info">
          <span class="lb-id" id="lb-id"></span>
          <div class="lb-desc" id="lb-desc"></div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>


    <!-- Face + Hand preview panel -->
    <div class="face-preview-panel">
      <video id="face-webcam" class="face-webcam-preview" autoplay muted playsinline></video>
      <canvas id="canvas" class="face-canvas-preview"></canvas>
      <div class="face-status-panel">
        <div id="face-status-label" class="face-status-bold">loading model…</div>
        <div>proximity: <span id="face-prox-label">&mdash;</span></div>
        <div>hand zoom: <span id="hand-size-label">&mdash;</span></div>
        <div id="face-calib-label"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.11.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.11.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.11.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-landmarks-detection@1.0.2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/hand-pose-detection@2.0.0"></script>
    <script src="procopio-ml.js"></script>
  </body>
</html>

<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Archivio di Camilla.</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="header-inner">
        <div class="header-row">
          <div class="search-wrap">
            <input
              id="search"
              type="search"
              placeholder="Cerca…"
              autocomplete="off"
            />
          </div>
          <button class="btn-random" id="btn-random">Random</button>
        </div>
        <div class="tags-bar" id="tags-bar"></div>
      </div>
    </header>

    <p class="results-info" id="results-info"></p>

    <main class="grid" id="grid"></main>

    <div class="lightbox" id="lightbox" aria-hidden="true">
      <div class="lb-backdrop" id="lb-backdrop"></div>
      <button class="lb-close" id="lb-close">✕</button>
      <button class="lb-prev" id="lb-prev">←</button>
      <button class="lb-next" id="lb-next">→</button>
      <div class="lb-content">
        <img class="lb-img" id="lb-img" src="" alt="">
        <div class="lb-info">
          <span class="lb-id" id="lb-id"></span>
          <div class="lb-tags" id="lb-tags"></div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
